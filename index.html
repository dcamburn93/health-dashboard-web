<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Danny — Today</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #141210; --card: #1c1916; --card2: #221f1b; --card3: #2a2520;
  --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.1);
  --text: #f0ebe3; --muted: #7a7168; --muted2: #4a4540;
  --run: #d4845a; --swim: #6ab3a8; --lift: #a8c47a;
  --sleep: #8b7ec8; --hr: #c87e8b; --steps: #c4a85a; --garmin: #5ab8d4;
  --serif: 'DM Serif Display', serif; --sans: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.5; min-height: 100vh; overscroll-behavior: none; }

/* HEADER */
.header { padding: 2rem 1.25rem 1rem; display: flex; justify-content: space-between; align-items: flex-start; }
.header-date { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 4px; }
.header-title { font-family: var(--serif); font-size: 42px; line-height: 1; letter-spacing: -1px; }
.sync-btn { background: none; border: 1px solid var(--border2); border-radius: 20px; color: var(--muted); font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; padding: 5px 12px; cursor: pointer; }
.sync-btn.syncing { color: var(--swim); border-color: var(--swim); }
.last-sync { font-family: var(--mono); font-size: 9px; color: var(--muted2); margin-top: 6px; text-align: right; }

/* CARDS */
.cards { padding: 0 1rem 6rem; display: flex; flex-direction: column; gap: 10px; max-width: 480px; margin: 0 auto; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem; cursor: pointer; transition: border-color 0.2s, transform 0.1s; active: transform 0.1s; }
.card:active { transform: scale(0.98); }
.card.tappable:hover { border-color: var(--border2); }
.card-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; }
.card-source { font-size: 9px; color: var(--muted2); }
.card-chevron { font-size: 12px; color: var(--muted2); transition: transform 0.2s; }

/* DETAIL OVERLAY */
.overlay { position: fixed; inset: 0; z-index: 100; pointer-events: none; }
.overlay.open { pointer-events: all; }
.overlay-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0); transition: background 0.3s; }
.overlay.open .overlay-backdrop { background: rgba(0,0,0,0.6); }
.detail-panel { position: absolute; bottom: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto; background: var(--card); border-radius: 20px 20px 0 0; border: 1px solid var(--border2); border-bottom: none; padding: 0; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32,0.72,0,1); max-height: 88vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.overlay.open .detail-panel { transform: translateY(0); }
.detail-handle { width: 36px; height: 4px; background: var(--muted2); border-radius: 2px; margin: 12px auto 0; }
.detail-header { padding: 1rem 1.25rem 0.5rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--card); z-index: 1; border-bottom: 1px solid var(--border); }
.detail-title { font-family: var(--serif); font-size: 24px; letter-spacing: -0.5px; }
.detail-close { background: var(--card2); border: none; color: var(--muted); width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
.detail-body { padding: 1.25rem; }

/* DETAIL SECTIONS */
.detail-section { margin-bottom: 1.5rem; }
.detail-section-title { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.75rem; }
.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.stat-row:last-child { border-bottom: none; }
.stat-key { font-size: 13px; color: var(--muted); }
.stat-val { font-family: var(--mono); font-size: 13px; font-weight: 500; }
.chart-wrap { position: relative; height: 160px; margin: 8px 0; }
.big-stat { margin-bottom: 1rem; }
.big-stat-val { font-family: var(--serif); font-size: 48px; line-height: 1; }
.big-stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
.mini-stat { background: var(--card2); border-radius: 10px; padding: 10px 12px; }
.mini-stat-label { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 4px; }
.mini-stat-val { font-family: var(--serif); font-size: 22px; line-height: 1; }
.mini-stat-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.history-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.history-row:last-child { border-bottom: none; }
.history-date { color: var(--muted); width: 56px; flex-shrink: 0; font-family: var(--mono); }
.history-bar-wrap { flex: 1; background: var(--card2); border-radius: 3px; height: 6px; }
.history-bar { height: 6px; border-radius: 3px; }
.history-val { width: 40px; text-align: right; color: var(--text); font-family: var(--mono); }
.stage-legend { display: flex; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
.stage-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); }
.stage-dot { width: 8px; height: 8px; border-radius: 2px; }
.workout-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
.workout-item:last-child { border-bottom: none; }
.workout-item-header { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
.workout-badge { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 4px; font-family: var(--mono); letter-spacing: .06em; }
.workout-item-name { font-size: 13px; font-weight: 500; flex: 1; }
.workout-item-stats { display: flex; gap: 12px; font-family: var(--mono); font-size: 11px; color: var(--muted); padding-left: 2px; }
.pr-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--run); margin-left: 4px; vertical-align: middle; }

/* SUMMARY CARDS (main view) */
.sleep-big { font-family: var(--serif); font-size: 56px; line-height: 1; }
.sleep-dot-live { width: 8px; height: 8px; border-radius: 50%; background: var(--sleep); display: inline-block; margin-left: 6px; vertical-align: middle; }
.stage-bar { display: flex; gap: 3px; margin: 10px 0 6px; height: 4px; border-radius: 2px; overflow: hidden; }
.stage-seg { height: 100%; border-radius: 2px; }
.sleep-dots { display: flex; gap: 6px; margin-top: 10px; }
.sleep-day-dot { width: 8px; height: 8px; border-radius: 50%; }
.move-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
.move-label { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 4px; }
.move-val { font-family: var(--serif); font-size: 36px; line-height: 1; }
.bar-row { display: flex; gap: 4px; align-items: flex-end; height: 48px; }
.bar-day { flex: 1; display: flex; flex-direction: column; gap: 2px; align-items: center; }
.bar-seg { width: 100%; border-radius: 2px 2px 0 0; min-height: 2px; }
.bar-lbl { font-family: var(--mono); font-size: 8px; color: var(--muted2); margin-top: 3px; }
.hr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.hr-label { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 4px; }
.hr-val { font-family: var(--serif); font-size: 38px; line-height: 1; }
.hr-unit { font-size: 13px; color: var(--muted); }
.sparkline { width: 100%; height: 32px; margin-top: 8px; }
.train-week { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
.train-mini { background: var(--card2); border-radius: 8px; padding: 10px; text-align: center; }
.train-mini-label { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 4px; }
.train-mini-val { font-family: var(--serif); font-size: 22px; line-height: 1; }
.train-mini-sub { font-family: var(--mono); font-size: 9px; color: var(--muted); margin-top: 2px; }
.workout-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.workout-row:last-child { border-bottom: none; }
.ws { font-size: 9px; font-weight: 700; letter-spacing: .06em; padding: 2px 7px; border-radius: 4px; min-width: 40px; text-align: center; font-family: var(--mono); }
.ws-run { background:rgba(212,132,90,.15);color:var(--run); }
.ws-swim { background:rgba(106,179,168,.15);color:var(--swim); }
.ws-ride { background:rgba(138,130,200,.15);color:#8a82c8; }
.ws-lift { background:rgba(168,196,122,.15);color:var(--lift); }
.ws-walk { background:rgba(196,168,90,.15);color:var(--steps); }
.workout-name { flex:1; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.workout-stat { font-family:var(--mono); font-size:11px; color:var(--muted); white-space:nowrap; }
.body-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); }
.body-row:last-child { border-bottom:none; }
.body-key { font-size:13px; color:var(--muted); }
.body-val { font-family:var(--mono); font-size:14px; font-weight:500; }
.loading { text-align:center; padding:3rem; color:var(--muted); font-family:var(--mono); font-size:11px; letter-spacing:.1em; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-date" id="header-date"></div>
    <div class="header-title">Today</div>
  </div>
  <div>
    <button class="sync-btn" id="sync-btn" onclick="loadAll()">↻ Refresh</button>

</div>

<div class="cards" id="cards">

</div>

<!-- DETAIL OVERLAY -->
<div class="overlay" id="overlay" onclick="closeDetail(event)">
  <div class="overlay-backdrop"></div>
  <div class="detail-panel" id="detail-panel">
    <div class="detail-handle"></div>
    <div class="detail-header">
      <div class="detail-title" id="detail-title"></div>
      <button class="detail-close" onclick="closeDetailBtn()">✕</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://csylhxbnpqsfwicqrsex.supabase.co';
const ANON_KEY = 'sb_publishable_sWgNLaMZQba18okU49M--A_eIYijz2v';

// Global data store
let DATA = {};
let detailCharts = [];

async function query(table, params='') {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
    headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}` }
  });
  if (!res.ok) throw new Error(`${table} failed`);
  return res.json();
}

// ── FORMATTERS ────────────────────────────────────────────────
const fmtDate = d => { const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'], months=['January','February','March','April','May','June','July','August','September','October','November','December']; return `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}`; };
const toMi = m => m ? (m/1609.34).toFixed(1) : '—';
const toPace = (s,m) => { if(!s||!m||m<100) return '—'; const mpm=(s/60)/(m/1609.34); return `${Math.floor(mpm)}:${String(Math.round((mpm%1)*60)).padStart(2,'0')}`; };
const toTime = s => { if(!s) return '—'; const h=Math.floor(s/3600),m=Math.floor((s%3600)/60); return h>0?`${h}h ${m}m`:`${m}m`; };
const sportColor = t => { if(!t) return '#888'; t=t.toLowerCase(); if(t.includes('run')) return '#d4845a'; if(t.includes('swim')) return '#6ab3a8'; if(t.includes('ride')) return '#8a82c8'; if(t.includes('walk')) return '#c4a85a'; return '#a8c47a'; };
const sportClass = t => { if(!t) return 'ws-lift'; t=t.toLowerCase(); if(t.includes('run')) return 'ws-run'; if(t.includes('swim')) return 'ws-swim'; if(t.includes('ride')) return 'ws-ride'; if(t.includes('walk')) return 'ws-walk'; return 'ws-lift'; };
const sportLabel = t => { if(!t) return 'LIFT'; return t.replace('WeightTraining','LIFT').replace('Run','RUN').replace('Swim','SWIM').replace('Ride','RIDE').replace('Walk','WALK').toUpperCase().slice(0,4); };
const shortDate = d => { const dt = new Date(d+'T12:00:00'); return ['Su','Mo','Tu','We','Th','Fr','Sa'][dt.getDay()]+' '+dt.getDate(); };

// ── WORKOUT PLAN ─────────────────────────────────────────────
// Phase 1, Week 3, Mon=Upper A, Wed=Lower A, Fri=Full Body
// Tue/Thu = run+swim, Sat = long run + optional swim, Sun = rest

const PLAN = {
  phase: 1, week: 3,
  // phase start date — adjust if needed
  phaseStart: '2026-06-02',

  sessions: {
    1: { // Monday
      type: 'lift', label: 'Upper A', color: '#a8c47a', source: 'Phase 1 · Wk 3',
      note: 'RPE 6–7 · ~45 min',
      exercises: [
        { name: 'Barbell bench press', sets: '3×10', weights: '135 / 135 / 135', note: 'Hold — consolidate before Ph.2' },
        { name: 'Barbell row',         sets: '3×10', weights: '95 / 95 / 95',    note: 'Settled at top end' },
        { name: 'Incline DB press',    sets: '3×12', weights: '90 / 90 / 90',    note: 'Hold — 12 reps clean' },
        { name: 'Seated cable row',    sets: '3×12', weights: '115 / 115 / 115', note: '' },
        { name: 'Lateral raises',      sets: '3×15', weights: '35 / 35 / 35',    note: 'Hold — form first' },
        { name: 'Tricep pushdown',     sets: '3×12', weights: '95 / 95 / 95',    note: '' },
        { name: 'Face pulls',          sets: '3×15', weights: '65 / 65 / 65',    note: 'Posture work' },
      ],
      cardio: { type: 'swim', label: 'Swim — easy aerobic', detail: '1,500–1,800m · 4×300 or 3×400 · ~1:15–1:20/100m' }
    },
    2: { // Tuesday
      type: 'run+swim', label: 'Zone 2 Run + Swim', color: '#d4845a', source: 'Phase 1 · Wk 3',
      note: 'All aerobic — RPE 6',
      sessions: [
        { type: 'run',  label: 'Zone 2 easy run',   detail: '30–35 min · HR 125–140 bpm · ~9:00–9:45/mi · cadence 170+ spm' },
        { type: 'swim', label: 'Easy aerobic swim',  detail: '1,500–1,800m · 2×800m or 4×300 · 60s rest · very easy pace' },
      ]
    },
    3: { // Wednesday
      type: 'lift', label: 'Lower A', color: '#a8c47a', source: 'Phase 1 · Wk 3',
      note: 'RPE 6–7 · ~45 min',
      exercises: [
        { name: 'Back squat',           sets: '3×10', weights: '45 / 95 / 95',    note: 'Deloaded — ease back in if back feels good' },
        { name: 'Romanian deadlift',    sets: '3×10', weights: '95 / 135 / 135',  note: 'Strong progression — keep it going' },
        { name: 'Leg press',            sets: '3×12', weights: '180 / 270 / 270', note: 'Lock in the top end' },
        { name: 'Lying leg curl',       sets: '3×12', weights: 'N/A',             note: 'Skipped last week — reintroduce light if back allows' },
        { name: 'Standing calf raise',  sets: '4×15', weights: 'N/A',             note: 'Skipped last week — reintroduce' },
      ]
    },
    4: { // Thursday
      type: 'run+swim', label: 'Zone 2 Run + Swim', color: '#d4845a', source: 'Phase 1 · Wk 3',
      note: 'All aerobic — RPE 6',
      sessions: [
        { type: 'swim', label: 'Easy aerobic swim',  detail: '1,500–1,800m · same easy aerobic format as Tue' },
        { type: 'run',  label: 'Zone 2 easy run',    detail: '30–35 min · HR 125–140 bpm · truly easy after swim' },
      ]
    },
    5: { // Friday
      type: 'lift', label: 'Full Body', color: '#a8c47a', source: 'Phase 1 · Wk 3',
      note: 'RPE 6 · ~40 min · moderate load',
      exercises: [
        { name: 'Goblet squat',              sets: '3×10', weights: '35 / 35 / 35',    note: 'Or 95 lb back squat if feeling good' },
        { name: 'DB bench press',            sets: '3×10', weights: '100 / 100 / 105', note: '' },
        { name: 'Romanian deadlift',         sets: '3×10', weights: '125 / 125 / 125', note: 'Lighter than Lower A' },
        { name: 'DB row (one arm)',          sets: '3×10', weights: '60 / 60 / 60',    note: 'per side' },
        { name: 'Barbell hip thrust',        sets: '3×12', weights: '95 / 95 / 95',    note: 'Return to bar, no band needed' },
        { name: 'Standing BB shoulder press',sets: '3×12', weights: '65 / 70 / 70',    note: '' },
      ]
    },
    6: { // Saturday
      type: 'run+swim', label: 'Long Run + Optional Swim', color: '#d4845a', source: 'Phase 1 · Wk 3',
      note: 'Easy effort only',
      sessions: [
        { type: 'run',  label: 'Long easy run',     detail: '40–45 min · HR 125–140 bpm · same Z2 effort · this is your longest run of the week' },
        { type: 'swim', label: 'Optional easy swim', detail: '1,000–1,200m · recovery pace · skip if fatigued' },
      ]
    },
    0: { // Sunday
      type: 'rest', label: 'Rest', color: '#4a4540', source: 'Phase 1 · Wk 3',
      note: 'Full rest or easy walk',
    }
  }
};

function getTodaySession() {
  const dow = new Date().getDay(); // 0=Sun, 1=Mon...
  return PLAN.sessions[dow] || PLAN.sessions[0];
}

function buildTodayWorkoutCard() {
  const s = getTodaySession();
  const dow = new Date().getDay();
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  if (s.type === 'rest') {
    return `<div class="card tappable" onclick="openDetail('workout')">
      <div class="card-label">Today's workout <span style="display:flex;align-items:center;gap:6px"><span class="card-source">Phase 1 · Wk 3</span><span class="card-chevron">›</span></span></div>
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:36px;height:36px;border-radius:50%;background:rgba(74,69,64,0.3);display:flex;align-items:center;justify-content:center;font-size:18px">😴</div>
        <div><div style="font-family:var(--serif);font-size:20px">Rest day</div><div style="font-size:12px;color:var(--muted);margin-top:2px">${s.note}</div></div>
      </div>
    </div>`;
  }

  if (s.type === 'lift') {
    const topExercises = s.exercises.slice(0, 3);
    return `<div class="card tappable" onclick="openDetail('workout')">
      <div class="card-label">Today's workout <span style="display:flex;align-items:center;gap:6px"><span class="card-source">${s.source}</span><span class="card-chevron">›</span></span></div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <div style="width:36px;height:36px;border-radius:8px;background:rgba(168,196,122,0.15);display:flex;align-items:center;justify-content:center;font-size:18px">🏋️</div>
        <div>
          <div style="font-family:var(--serif);font-size:22px;color:var(--lift)">${s.label}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">${s.note}</div>
        </div>
      </div>
      ${topExercises.map(e=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-size:13px">${e.name}</div>
          <div style="font-family:var(--mono);font-size:10px;color:var(--muted)">${e.sets}</div>
        </div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--lift);text-align:right">${e.weights}</div>
      </div>`).join('')}
      <div style="font-family:var(--mono);font-size:10px;color:var(--muted2);margin-top:8px">+ ${s.exercises.length - 3} more exercises · tap for full workout</div>
      ${s.cardio?`<div style="margin-top:10px;padding:8px 10px;background:rgba(106,179,168,0.08);border-radius:8px;border-left:2px solid var(--swim)">
        <div style="font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--swim);margin-bottom:2px">Also today</div>
        <div style="font-size:12px">${s.cardio.label}</div>
        <div style="font-size:11px;color:var(--muted)">${s.cardio.detail}</div>
      </div>`:''}
    </div>`;
  }

  if (s.type === 'run+swim') {
    return `<div class="card tappable" onclick="openDetail('workout')">
      <div class="card-label">Today's workout <span style="display:flex;align-items:center;gap:6px"><span class="card-source">${s.source}</span><span class="card-chevron">›</span></span></div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <div style="width:36px;height:36px;border-radius:8px;background:rgba(212,132,90,0.12);display:flex;align-items:center;justify-content:center;font-size:18px">🏃</div>
        <div>
          <div style="font-family:var(--serif);font-size:22px;color:var(--run)">${s.label}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">${s.note}</div>
        </div>
      </div>

}

// ── HEATMAP ───────────────────────────────────────────────────
function buildHeatmap(yearW, expanded) {
  // Build a map of date -> [sport_types]
  const dayMap = {};
  for (const w of yearW) {
    if (!dayMap[w.date]) dayMap[w.date] = [];
    dayMap[w.date].push(w.sport_type?.toLowerCase() || '');
  }

  function cellColor(types) {
    if (!types || types.length === 0) return '#1e1c18';
    // Priority: race > ride > run > swim > lift > walk
    if (types.some(t=>t.includes('run')&&!t.includes('weight'))) {
      const hasSwim = types.some(t=>t.includes('swim'));
      const hasLift = types.some(t=>t.includes('weight')||t.includes('strength'));
      if (hasSwim && hasLift) return '#e8c060'; // triple day
      if (hasSwim || hasLift) return '#d4845a'; // double day
      return '#d4845a';
    }
    if (types.some(t=>t.includes('swim'))) return '#6ab3a8';
    if (types.some(t=>t.includes('weight')||t.includes('strength'))) return '#a8c47a';
    if (types.some(t=>t.includes('ride')||t.includes('cycling'))) return '#8a82c8';
    if (types.some(t=>t.includes('walk'))) return '#4a4540';
    return '#3a3530';
  }

  function cellOpacity(types) {
    if (!types || types.length === 0) return 0.3;
    return 1;
  }

  // Generate all days of 2026
  const start = new Date('2026-01-01');
  const today = new Date();
  const cells = [];
  const d = new Date(start);

  // Pad to start on Sunday
  const startDow = start.getDay();
  for (let i = 0; i < startDow; i++) cells.push(null);

  while (d <= today) {
    cells.push(d.toISOString().slice(0, 10));
    d.setDate(d.getDate() + 1);
  }

  const cellSize = expanded ? 12 : 9;
  const gap = expanded ? 2 : 1.5;
  const weeks = Math.ceil(cells.length / 7);
  const width = weeks * (cellSize + gap);
  const height = 7 * (cellSize + gap);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // Month labels
  const monthLabels = [];
  let lastMonth = -1;
  for (let i = 0; i < cells.length; i++) {
    if (!cells[i]) continue;
    const mo = new Date(cells[i]).getMonth();
    if (mo !== lastMonth) {
      const col = Math.floor(i / 7);
      monthLabels.push({ month: months[mo], x: col * (cellSize + gap) });
      lastMonth = mo;
    }
  }

  let svg = `<svg viewBox="0 0 ${width} ${height + (expanded?16:0)}" width="100%" style="overflow:visible">`;

  if (expanded) {
    for (const { month, x } of monthLabels) {
      svg += `<text x="${x}" y="10" fill="#4a4540" font-size="8" font-family="'DM Mono',monospace">${month}</text>`;
    }
    svg += `<g transform="translate(0,14)">`;
  }

  for (let i = 0; i < cells.length; i++) {
    const date = cells[i];
    const col = Math.floor(i / 7);
    const row = i % 7;
    const x = col * (cellSize + gap);
    const y = row * (cellSize + gap);

    if (!date) {
      svg += `<rect x="${x}" y="${y}" width="${cellSize}" height="${cellSize}" rx="2" fill="#1e1c18"/>`;
      continue;
    }

    const types = dayMap[date];
    const color = cellColor(types);
    const opacity = cellOpacity(types);
    const isToday = date === today.toISOString().slice(0,10);
    const title = types?.length ? `${date}: ${types.join(', ')}` : date;

    svg += `<rect x="${x}" y="${y}" width="${cellSize}" height="${cellSize}" rx="2" fill="${color}" opacity="${opacity}"${isToday?' stroke="#f0ebe3" stroke-width="1"':''}>
      <title>${title}</title>
    </rect>`;
  }

  if (expanded) svg += `</g>`;
  svg += `</svg>`;
  return svg;
}

    const res = await fetch('/api/insight', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    const data = await res.json();
    const text = data.insight?.trim();
    if (text && el) {
      el.textContent = text;
      meta.textContent = `Generated ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} · based on today's data`;
    }
  } catch(err) {
    if (el) el.innerHTML = '<span style="color:var(--muted2);font-size:13px;font-style:italic">Could not generate insight — check connection</span>';
  }
}

// ── DETAIL PANELS ─────────────────────────────────────────────
function openDetail(type) {
  detailCharts.forEach(c=>c.destroy()); detailCharts=[];
  const panel = document.getElementById('detail-panel');
  const titles = { sleep:'Sleep', movement:'Movement', heart:'Heart Rate & HRV', training:'Training', body:'Body', recovery:'Recovery', workout:"Today's Workout", heatmap:'2026 in Training' };
  document.getElementById('detail-title').textContent = titles[type]||type;
  document.getElementById('detail-body').innerHTML = buildDetail(type);
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  panel.scrollTop = 0;
  // Build charts after render
  setTimeout(() => buildDetailCharts(type), 50);
}

function closeDetail(e) {
  if (e.target === document.getElementById('overlay') || e.target.classList.contains('overlay-backdrop')) closeDetailBtn();
}
function closeDetailBtn() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
  detailCharts.forEach(c=>c.destroy()); detailCharts=[];
}

    const totalLifts = yearW.filter(w=>w.sport_type?.toLowerCase().includes('weight')||w.sport_type?.toLowerCase().includes('strength')).length;
    const totalDays  = new Set(yearW.map(w=>w.date)).size;
    const dayOfYear  = Math.floor((new Date() - new Date('2026-01-01')) / 86400000) + 1;
    const pct        = Math.round((totalDays / dayOfYear) * 100);
    return `
    <div class="detail-section">
      <div class="grid2">
        <div class="mini-stat"><div class="mini-stat-label">Active days</div><div class="mini-stat-val" style="color:var(--steps)">${totalDays}</div><div class="mini-stat-sub">${pct}% of year so far</div></div>
        <div class="mini-stat"><div class="mini-stat-label">Runs</div><div class="mini-stat-val" style="color:var(--run)">${totalRuns}</div><div class="mini-stat-sub">sessions</div></div>
        <div class="mini-stat"><div class="mini-stat-label">Swims</div><div class="mini-stat-val" style="color:var(--swim)">${totalSwims}</div><div class="mini-stat-sub">sessions</div></div>
        <div class="mini-stat"><div class="mini-stat-label">Lifts</div><div class="mini-stat-val" style="color:var(--lift)">${totalLifts}</div><div class="mini-stat-sub">sessions</div></div>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Every day of 2026</div>
      <div style="overflow-x:auto;padding-bottom:4px">${buildHeatmap(yearW, true)}</div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Legend</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)"><span style="width:12px;height:12px;border-radius:2px;background:#d4845a;flex-shrink:0"></span>Run</div>
        <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)"><span style="width:12px;height:12px;border-radius:2px;background:#6ab3a8;flex-shrink:0"></span>Swim</div>
        <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)"><span style="width:12px;height:12px;border-radius:2px;background:#a8c47a;flex-shrink:0"></span>Lift</div>
        <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)"><span style="width:12px;height:12px;border-radius:2px;background:#8a82c8;flex-shrink:0"></span>Ride</div>
        <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)"><span style="width:12px;height:12px;border-radius:2px;background:#e8c060;flex-shrink:0"></span>Triple day</div>
        <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)"><span style="width:12px;height:12px;border-radius:2px;background:#1e1c18;border:1px solid #3a3530;flex-shrink:0"></span>Rest</div>
      </div>
    </div>`;
  }

  return '';
}

function buildDetailCharts(type) {
  const { sleep90, hr90, activity90, body, garmin } = DATA;
  const chartDefaults = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    elements: { point: { radius: 0 } },
  };
  const gridColor = 'rgba(255,255,255,0.04)';
  const tickColor = '#4a4540';
  const tickFont  = { size: 10, family: "'DM Mono', monospace" };

  if (type === 'sleep') {
    const s = [...sleep90].reverse();
    const c1 = new Chart(document.getElementById('sleepChart'), {
      type: 'bar',
      data: { labels: s.map(x=>shortDate(x.date)), datasets: [{ data: s.map(x=>x.duration_h||0), backgroundColor: s.map(x=>(x.duration_h||0)>=7?'#6a5fa8':'#3a3040'), borderRadius: 2 }] },
      options: { ...chartDefaults, scales: { x: { ticks: { color: tickColor, font: tickFont, maxTicksLimit: 8, maxRotation: 0 }, grid: { display: false } }, y: { ticks: { color: tickColor, font: tickFont, callback: v=>`${v}h` }, grid: { color: gridColor } } } }
    });
    detailCharts.push(c1);

    const s14 = [...sleep90.slice(0,14)].reverse().filter(x=>x.deep_h||x.rem_h);
    const c2 = new Chart(document.getElementById('stageChart'), {
      type: 'bar',
      data: { labels: s14.map(x=>shortDate(x.date)), datasets: [
        { label: 'Deep', data: s14.map(x=>x.deep_h||0), backgroundColor: '#5a4fa8', stack: 'a', borderRadius: 2 },
        { label: 'REM',  data: s14.map(x=>x.rem_h||0),  backgroundColor: '#8b7ec8', stack: 'a' },
        { label: 'Core', data: s14.map(x=>x.core_h||0), backgroundColor: '#c8b8f0', stack: 'a' },
      ]},
      options: { ...chartDefaults, scales: { x: { stacked: true, ticks: { color: tickColor, font: tickFont, maxRotation: 0 }, grid: { display: false } }, y: { stacked: true, ticks: { color: tickColor, font: tickFont, callback: v=>`${v}h` }, grid: { color: gridColor } } }, plugins: { legend: { display: true, labels: { color: '#7a7168', font: tickFont, usePointStyle: true, padding: 12 } } } }
    });
    detailCharts.push(c2);
  }

  if (type === 'movement') {
    const a = [...activity90].reverse();
    const c = new Chart(document.getElementById('stepsChart'), {
      type: 'bar',
      data: { labels: a.map(x=>shortDate(x.date)), datasets: [{ data: a.map(x=>x.steps||0), backgroundColor: 'rgba(196,168,90,0.6)', borderRadius: 2 }] },
      options: { ...chartDefaults, scales: { x: { ticks: { color: tickColor, font: tickFont, maxTicksLimit: 10, maxRotation: 0 }, grid: { display: false } }, y: { ticks: { color: tickColor, font: tickFont, callback: v=>v>=1000?`${(v/1000).toFixed(0)}k`:v }, grid: { color: gridColor } } } }
    });
    detailCharts.push(c);
  }

  if (type === 'heart') {
    const h = [...hr90].reverse().filter(x=>x.resting_hr);
    const c1 = new Chart(document.getElementById('hrChart'), {
      type: 'line',
      data: { labels: h.map(x=>shortDate(x.date)), datasets: [{ data: h.map(x=>x.resting_hr), borderColor: '#c87e8b', backgroundColor: 'rgba(200,126,139,0.08)', borderWidth: 2, fill: true, tension: 0.3 }] },
      options: { ...chartDefaults, scales: { x: { ticks: { color: tickColor, font: tickFont, maxTicksLimit: 8, maxRotation: 0 }, grid: { display: false } }, y: { reverse: false, ticks: { color: tickColor, font: tickFont, callback: v=>`${v}` }, grid: { color: gridColor } } } }
    });
    detailCharts.push(c1);

    const hv = [...hr90].reverse().filter(x=>x.hrv_ms&&!isNaN(x.hrv_ms));
    const c2 = new Chart(document.getElementById('hrvChart'), {
      type: 'line',
      data: { labels: hv.map(x=>shortDate(x.date)), datasets: [{ data: hv.map(x=>x.hrv_ms), borderColor: '#8b7ec8', backgroundColor: 'rgba(139,126,200,0.08)', borderWidth: 2, fill: true, tension: 0.3 }] },
      options: { ...chartDefaults, scales: { x: { ticks: { color: tickColor, font: tickFont, maxTicksLimit: 8, maxRotation: 0 }, grid: { display: false } }, y: { ticks: { color: tickColor, font: tickFont, callback: v=>`${v}ms` }, grid: { color: gridColor } } } }
    });
    detailCharts.push(c2);
  }

  if (type === 'body') {
    const bw = [...body.filter(b=>b.weight_lbs)].reverse();
    const c = new Chart(document.getElementById('weightChart'), {
      type: 'line',
      data: { labels: bw.map(x=>shortDate(x.date)), datasets: [{ data: bw.map(x=>x.weight_lbs), borderColor: '#c4a85a', backgroundColor: 'rgba(196,168,90,0.08)', borderWidth: 2, fill: true, tension: 0.3 }] },
      options: { ...chartDefaults, scales: { x: { ticks: { color: tickColor, font: tickFont, maxTicksLimit: 8, maxRotation: 0 }, grid: { display: false } }, y: { ticks: { color: tickColor, font: tickFont, callback: v=>`${v}` }, grid: { color: gridColor } } } }
    });
    detailCharts.push(c);
  }

  if (type === 'recovery' && garmin.length) {
    const g = [...garmin].reverse();
    const c = new Chart(document.getElementById('batteryChart'), {
      type: 'bar',
      data: { labels: g.map(x=>shortDate(x.date)), datasets: [
        { label: 'Max', data: g.map(x=>x.body_battery_max||0), backgroundColor: 'rgba(168,196,122,0.7)', borderRadius: 2, stack: 'a' },
      ]},
      options: { ...chartDefaults, scales: { x: { ticks: { color: tickColor, font: tickFont, maxRotation: 0 }, grid: { display: false } }, y: { min: 0, max: 100, ticks: { color: tickColor, font: tickFont }, grid: { color: gridColor } } } }
    });
    detailCharts.push(c);
  }
}

// Handle swipe down to close
let touchStartY = 0;
document.getElementById('detail-panel').addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
document.getElementById('detail-panel').addEventListener('touchmove', e => {
  if (document.getElementById('detail-panel').scrollTop === 0 && e.touches[0].clientY - touchStartY > 60) closeDetailBtn();
}, { passive: true });

loadAll();
setInterval(loadAll, 5 * 60 * 1000);
</script>
</body>
</html>
