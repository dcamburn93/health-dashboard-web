<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Danny — Today</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #141210; --card: #1c1916; --card2: #221f1b; --card3: #2a2520;
  --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.1);
  --text: #f0ebe3; --muted: #7a7168; --muted2: #4a4540;
  --run: #d4845a; --swim: #6ab3a8; --lift: #a8c47a; --bike: #a882c8;
  --sleep: #8b7ec8; --hr: #c87e8b; --steps: #c4a85a; --garmin: #5ab8d4;
  --serif: 'DM Serif Display', serif; --sans: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.5; min-height: 100vh; overscroll-behavior: none; }
.header { padding: 2rem 1.25rem 1rem; display: flex; justify-content: space-between; align-items: flex-start; }
.header-date { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 4px; }
.header-title { font-family: var(--serif); font-size: 42px; line-height: 1; letter-spacing: -1px; }
.sync-btn { background: none; border: 1px solid var(--border2); border-radius: 20px; color: var(--muted); font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; padding: 5px 12px; cursor: pointer; }
.sync-btn.syncing { color: var(--swim); border-color: var(--swim); }
.last-sync { font-family: var(--mono); font-size: 9px; color: var(--muted2); margin-top: 6px; text-align: right; }
.cards { padding: 0 1rem 6rem; display: flex; flex-direction: column; gap: 10px; max-width: 480px; margin: 0 auto; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem; cursor: pointer; transition: border-color 0.2s, transform 0.1s; }
.card:active { transform: scale(0.98); }
.card.tappable:hover { border-color: var(--border2); }
.card-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; }
.card-source { font-size: 9px; color: var(--muted2); }
.card-chevron { font-size: 12px; color: var(--muted2); transition: transform 0.2s; }
.overlay { position: fixed; inset: 0; z-index: 100; pointer-events: none; }
.overlay.open { pointer-events: all; }
.overlay-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0); transition: background 0.3s; }
.overlay.open .overlay-backdrop { background: rgba(0,0,0,0.6); }
.detail-panel { position: absolute; bottom: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto; background: var(--card); border-radius: 20px 20px 0 0; border: 1px solid var(--border2); border-bottom: none; padding: 0; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32,0.72,0,1); max-height: 88vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.overlay.open .detail-panel { transform: translateY(0); }
.detail-handle { width: 36px; height: 4px; background: var(--muted2); border-radius: 2px; margin: 12px auto 0; }
.detail-header { padding: 1rem 1.25rem 0.5rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--card); z-index: 1; border-bottom: 1px solid var(--border); }
.detail-title { font-family: var(--serif); font-size: 24px; letter-spacing: -0.5px; }
.detail-close { background: var(--card2); border: none; color: var(--muted); width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
.detail-body { padding: 1.25rem; }
.detail-section { margin-bottom: 1.5rem; }
.detail-section-title { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.75rem; }
.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.stat-row:last-child { border-bottom: none; }
.stat-key { font-size: 13px; color: var(--muted); }
.stat-val { font-family: var(--mono); font-size: 13px; font-weight: 500; }
.chart-wrap { position: relative; height: 160px; margin: 8px 0; }
.big-stat { margin-bottom: 1rem; }
.big-stat-val { font-family: var(--serif); font-size: 48px; line-height: 1; }
.big-stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
.mini-stat { background: var(--card2); border-radius: 10px; padding: 10px 12px; }
.mini-stat-label { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 4px; }
.mini-stat-val { font-family: var(--serif); font-size: 22px; line-height: 1; }
.mini-stat-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.history-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.history-row:last-child { border-bottom: none; }
.history-date { color: var(--muted); width: 56px; flex-shrink: 0; font-family: var(--mono); }
.history-bar-wrap { flex: 1; background: var(--card2); border-radius: 3px; height: 6px; }
.history-bar { height: 6px; border-radius: 3px; }
.history-val { width: 40px; text-align: right; color: var(--text); font-family: var(--mono); }
.stage-legend { display: flex; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
.stage-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); }
.stage-dot { width: 8px; height: 8px; border-radius: 2px; }
.workout-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
.workout-item:last-child { border-bottom: none; }
.workout-item-header { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
.workout-badge { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 4px; font-family: var(--mono); letter-spacing: .06em; }
.workout-item-name { font-size: 13px; font-weight: 500; flex: 1; }
.workout-item-stats { display: flex; gap: 12px; font-family: var(--mono); font-size: 11px; color: var(--muted); padding-left: 2px; }
.pr-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--run); margin-left: 4px; vertical-align: middle; }
.sleep-big { font-family: var(--serif); font-size: 56px; line-height: 1; }
.sleep-dot-live { width: 8px; height: 8px; border-radius: 50%; background: var(--sleep); display: inline-block; margin-left: 6px; vertical-align: middle; }
.stage-bar { display: flex; gap: 3px; margin: 10px 0 6px; height: 4px; border-radius: 2px; overflow: hidden; }
.stage-seg { height: 100%; border-radius: 2px; }
.sleep-dots { display: flex; gap: 6px; margin-top: 10px; }
.sleep-day-dot { width: 8px; height: 8px; border-radius: 50%; }
.move-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
.move-label { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 4px; }
.move-val { font-family: var(--serif); font-size: 36px; line-height: 1; }
.bar-row { display: flex; gap: 4px; align-items: flex-end; height: 48px; }
.bar-day { flex: 1; display: flex; flex-direction: column; gap: 2px; align-items: center; }
.bar-seg { width: 100%; border-radius: 2px 2px 0 0; min-height: 2px; }
.bar-lbl { font-family: var(--mono); font-size: 8px; color: var(--muted2); margin-top: 3px; }
.hr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.hr-label { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 4px; }
.hr-val { font-family: var(--serif); font-size: 38px; line-height: 1; }
.hr-unit { font-size: 13px; color: var(--muted); }
.sparkline { width: 100%; height: 32px; margin-top: 8px; }
.train-week { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
.train-mini { background: var(--card2); border-radius: 8px; padding: 10px; text-align: center; }
.train-mini-label { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 4px; }
.train-mini-val { font-family: var(--serif); font-size: 22px; line-height: 1; }
.train-mini-sub { font-family: var(--mono); font-size: 9px; color: var(--muted); margin-top: 2px; }
.workout-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.workout-row:last-child { border-bottom: none; }
.ws { font-size: 9px; font-weight: 700; letter-spacing: .06em; padding: 2px 7px; border-radius: 4px; min-width: 40px; text-align: center; font-family: var(--mono); }
.ws-run { background:rgba(212,132,90,.15);color:var(--run); }
.ws-swim { background:rgba(106,179,168,.15);color:var(--swim); }
.ws-ride { background:rgba(138,130,200,.15);color:#8a82c8; }
.ws-lift { background:rgba(168,196,122,.15);color:var(--lift); }
.ws-walk { background:rgba(196,168,90,.15);color:var(--steps); }
.workout-name { flex:1; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.workout-stat { font-family:var(--mono); font-size:11px; color:var(--muted); white-space:nowrap; }
.body-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); }
.body-row:last-child { border-bottom:none; }
.body-key { font-size:13px; color:var(--muted); }
.body-val { font-family:var(--mono); font-size:14px; font-weight:500; }
.loading { text-align:center; padding:3rem; color:var(--muted); font-family:var(--mono); font-size:11px; letter-spacing:.1em; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
</style>
</head>

<div class="header">
  <div>
    <div class="header-date" id="header-date"></div>
    <div class="header-title">Today</div>
  </div>
  <div>
    <button class="sync-btn" id="sync-btn" onclick="loadAll()">↻ Refresh</button>
    <div class="last-sync" id="last-sync">loading...</div>
  </div>
</div>

<div class="cards" id="cards">
  <div class="loading">LOADING YOUR DATA</div>
</div>

<div class="overlay" id="overlay" onclick="closeDetail(event)">
  <div class="overlay-backdrop"></div>
  <div class="detail-panel" id="detail-panel">
    <div class="detail-handle"></div>
    <div class="detail-header">
      <div class="detail-title" id="detail-title"></div>
      <button class="detail-close" onclick="closeDetailBtn()">✕</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://csylhxbnpqsfwicqrsex.supabase.co';
const ANON_KEY = 'sb_publishable_sWgNLaMZQba18okU49M--A_eIYijz2v';

let DATA = {};
let detailCharts = [];

async function query(table, params='') {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
    headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}` }
  });
  if (!res.ok) throw new Error(`${table} failed`);
  return res.json();
}

// ── FORMATTERS ────────────────────────────────────────────────
const fmtDate = d => {
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],
        months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}`;
};
const toMi = m => m ? (m/1609.34).toFixed(1) : '—';
const toPace = (s,m) => { if(!s||!m||m<100) return '—'; const mpm=(s/60)/(m/1609.34); return `${Math.floor(mpm)}:${String(Math.round((mpm%1)*60)).padStart(2,'0')}`; };
const toTime = s => { if(!s) return '—'; const h=Math.floor(s/3600),m=Math.floor((s%3600)/60); return h>0?`${h}h ${m}m`:`${m}m`; };
const sportColor = t => { if(!t) return '#888'; t=t.toLowerCase(); if(t.includes('run')) return '#d4845a'; if(t.includes('swim')) return '#6ab3a8'; if(t.includes('ride')) return '#8a82c8'; if(t.includes('walk')) return '#c4a85a'; return '#a8c47a'; };
const sportClass = t => { if(!t) return 'ws-lift'; t=t.toLowerCase(); if(t.includes('run')) return 'ws-run'; if(t.includes('swim')) return 'ws-swim'; if(t.includes('ride')) return 'ws-ride'; if(t.includes('walk')) return 'ws-walk'; return 'ws-lift'; };
const sportLabel = t => { if(!t) return 'LIFT'; return t.replace('WeightTraining','LIFT').replace('Run','RUN').replace('Swim','SWIM').replace('Ride','RIDE').replace('Walk','WALK').toUpperCase().slice(0,4); };
const shortDate = d => { const dt = new Date(d+'T12:00:00'); return ['Su','Mo','Tu','We','Th','Fr','Sa'][dt.getDay()]+' '+dt.getDate(); };

// ── DYNAMIC PLAN ENGINE ───────────────────────────────────────
// Program start: May 24, 2026. New structure starts Week 4 (Jun 14).
// Phases: Foundation W1-4 (May 24–Jun 20), Build W5-8 (Jun 21–Jul 18), Peak W9-12 (Jul 19–Aug 15)
// Deload weeks: 4, 8, 12

const PROGRAM_START = new Date('2026-05-24T00:00:00');

function getProgramContext() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const msPerWeek = 7 * 24 * 60 * 60 * 1000;
  const daysSinceStart = Math.floor((today - PROGRAM_START) / (24*60*60*1000));
  const weekNum = Math.min(12, Math.max(1, Math.floor(daysSinceStart / 7) + 1));
  const phase = weekNum <= 4 ? 1 : weekNum <= 8 ? 2 : 3;
  const phaseName = phase === 1 ? 'Foundation' : phase === 2 ? 'Build' : 'Peak';
  const isDeload = weekNum === 4 || weekNum === 8 || weekNum === 12;
  const useNewStructure = weekNum >= 4; // New M/W/F lift+bike, Tu/Th swim+run structure
  return { weekNum, phase, phaseName, isDeload, useNewStructure };
}

function getBikeDetail(ctx) {
  if (ctx.isDeload) return 'Easy 20–25 min spin · Zone 1–2 · flush legs after lifting';
  if (ctx.phase === 1) return 'Zone 2 · 25–30 min · conversational pace';
  if (ctx.phase === 2) {
    if (ctx.weekNum <= 6) return 'Zone 2 + 2×8 min tempo · 30–35 min total';
    return '3×10 min threshold · Zone 3–4 · 35 min total';
  }
  return '4–5×8 min sweet spot (88–93% FTP) · 35–45 min total';
}

function getLiftLabel(dow, ctx) {
  // Mon = Upper A, Wed = Lower A, Fri = Upper B
  if (ctx.phase === 1 && ctx.weekNum < 4) {
    // Old structure: Mon=Upper A, Wed=Lower A, Fri=Full Body
    if (dow === 1) return 'Upper A';
    if (dow === 3) return 'Lower A';
    if (dow === 5) return 'Full Body';
  }
  if (dow === 1) return 'Upper A';
  if (dow === 3) return 'Lower A';
  if (dow === 5) return 'Upper B';
  return 'Lift';
}

function getSwimDetail(isThursday, ctx) {
  if (ctx.isDeload) return isThursday ? 'Drill focus · 1,400m · easy recovery' : 'Easy aerobic · 1,400m · free swim';
  if (ctx.phase === 1) return isThursday ? 'Easy aerobic · 1,500–1,800m · same format as Tue' : 'Zone 2 · 1,800–2,200m · 4×300 or 3×400 · ~1:15–1:20/100m';
  if (ctx.phase === 2) return isThursday ? 'Threshold · 2,200–2,600m · 3×400 at CSS–5s' : 'Endurance · 2,400–2,800m · 4–6×200m at CSS+5s';
  return isThursday ? 'Race-pace · 2,800–3,200m · 2×(400+300+200+100)' : 'Speed · 3,000–3,400m · 6–8×100m fast + 4×200m CSS';
}

function getRunDetail(isThursday, ctx) {
  if (ctx.isDeload) return 'Easy jog · 25 min · Zone 1–2 only';
  if (ctx.phase === 1) return isThursday ? 'Easy run after swim · 30–35 min · HR 125–140' : 'Zone 2 easy run · 30–35 min · HR 125–140 bpm';
  if (ctx.phase === 2) return isThursday ? 'Tempo run · 35–42 min · 10 easy + 15–20 min Zone 3–4 + CD' : 'Easy run · 38–42 min · Zone 2';
  return isThursday ? 'Intervals · 40–45 min · 10 WU + 5–6×1km @ 5k effort + CD' : 'Easy run · 42–48 min · Zone 2';
}

function getSaturdaySession(ctx) {
  return {
    type: 'open',
    label: 'Open Session',
    source: `Phase ${ctx.phase} · Wk ${ctx.weekNum}`,
    note: ctx.isDeload ? 'Keep easy — Zone 1–2 max · 30 min cap' : 'Your call — run, swim, or both',
    detail: ctx.isDeload
      ? 'Easy swim or short easy run. Keep it genuinely light.'
      : ctx.phase === 3
        ? 'Great slot for a longer easy run (60+ min) or easy brick. Match effort to weekly fatigue.'
        : 'Run, swim, or both. Match to how your legs feel after the week.',
  };
}

function getTodaySession() {
  const ctx = getProgramContext();
  const dow = new Date().getDay(); // 0=Sun ... 6=Sat

  // Pre-Week 4: old structure
  if (!ctx.useNewStructure) {
    return getLegacySession(dow, ctx);
  }

  // Week 4+ new structure
  if (dow === 0) { // Sunday — Rest
    return { type: 'rest', label: 'Rest', source: `Phase ${ctx.phase} · Wk ${ctx.weekNum}`, note: 'Full rest or easy walk' };
  }

  if (dow === 1 || dow === 3 || dow === 5) { // Mon / Wed / Fri — Lift + Bike
    const liftLabel = getLiftLabel(dow, ctx);
    const bikeDetail = getBikeDetail(ctx);
    const liftNote = ctx.isDeload ? 'Deload — 60% load, same movements' : `RPE ${ctx.phase === 3 ? '8–9' : ctx.phase === 2 ? '7–8' : '6–7'} · ~45 min`;
    return {
      type: 'lift+bike',
      label: `${liftLabel} + Bike`,
      liftLabel,
      bikeDetail,
      source: `Phase ${ctx.phase} · Wk ${ctx.weekNum}${ctx.isDeload ? ' · Deload' : ''}`,
      note: liftNote,
      exercises: getLiftExercises(liftLabel, ctx),
    };
  }

  if (dow === 2 || dow === 4) { // Tue / Thu — Swim + Run
    const isThu = dow === 4;
    const swimDetail = getSwimDetail(isThu, ctx);
    const runDetail = getRunDetail(isThu, ctx);
    return {
      type: 'swim+run',
      label: isThu ? 'Swim + Run' : 'Swim + Run',
      source: `Phase ${ctx.phase} · Wk ${ctx.weekNum}${ctx.isDeload ? ' · Deload' : ''}`,
      note: ctx.isDeload ? 'Easy effort only — aerobic flush' : `Phase ${ctx.phase} aerobic ${isThu ? '· intensity day' : '· base day'}`,
      sessions: [
        { type: 'swim', label: isThu ? 'Threshold swim' : 'Endurance swim', detail: swimDetail },
        { type: 'run', label: isThu ? 'Tempo/interval run' : 'Easy run', detail: runDetail },
      ]
    };
  }

  if (dow === 6) { // Saturday — Open
    return getSaturdaySession(ctx);
  }

  return { type: 'rest', label: 'Rest', source: `Phase ${ctx.phase} · Wk ${ctx.weekNum}`, note: 'Full rest' };
}

function getLiftExercises(label, ctx) {
  // Returns exercise list based on lift label and phase
  const ph = ctx.phase;
  const isDeload = ctx.isDeload;
  const sets = isDeload ? '3×6' : ph === 3 ? '5×3–5' : ph === 2 ? '4×4–6' : '3×8–10';

  if (label === 'Upper A') return [
    { name: 'Bench Press', sets: isDeload?'3×6':'4×4–6', weights: '—', note: isDeload?'60% 1RM':'Primary · RPE 8+' },
    { name: 'Barbell Row', sets: isDeload?'3×6':'4×4–6', weights: '—', note: 'Pair with bench' },
    { name: 'Strict OHP', sets: '3×6–8', weights: '—', note: 'No leg drive' },
    { name: 'Weighted Pull-ups', sets: '3×5–7', weights: '—', note: 'BW if needed' },
    { name: 'Face Pulls', sets: '3×15', weights: '—', note: 'Every upper day' },
    { name: 'Tricep Dips / Pushdown', sets: '3×10', weights: '—', note: '' },
  ];
  if (label === 'Upper B') return [
    { name: 'Incline DB Press', sets: '4×8–10', weights: '—', note: 'Moderate load' },
    { name: 'Single-Arm Cable Row', sets: '4×10–12', weights: '—', note: 'Full stretch' },
    { name: 'Lateral Raises', sets: '4×12–15', weights: '—', note: 'Light · continuous tension' },
    { name: 'Chest-Supported Row', sets: '3×12', weights: '—', note: 'No spinal load' },
    { name: 'Hammer Curls', sets: '3×12', weights: '—', note: '' },
    { name: 'Cable Tricep OH Ext.', sets: '3×12', weights: '—', note: 'Long-head stretch' },
  ];
  if (label === 'Lower A') return [
    { name: 'Back Squat', sets: isDeload?'3×6':'4×4–6', weights: '—', note: isDeload?'60% 1RM':'Primary · RPE 8+' },
    { name: 'Romanian Deadlift', sets: '3×8', weights: '—', note: 'Hamstring load' },
    { name: 'Leg Press', sets: '3×10–12', weights: '—', note: '' },
    { name: 'Nordic Hamstring Curl', sets: '3×5–8', weights: '—', note: 'Injury prevention' },
    { name: 'Single-Leg Calf Raise', sets: '3×15/leg', weights: '—', note: 'Add DB when BW is easy' },
    { name: 'Copenhagen Plank', sets: '3×25s/side', weights: '—', note: 'Adductor + core' },
  ];
  if (label === 'Full Body') return [
    { name: 'Goblet Squat', sets: '3×10', weights: '—', note: '' },
    { name: 'DB Bench Press', sets: '3×10', weights: '—', note: '' },
    { name: 'Romanian Deadlift', sets: '3×10', weights: '—', note: 'Lighter than Lower A' },
    { name: 'DB Row (one arm)', sets: '3×10', weights: '—', note: 'per side' },
    { name: 'BB Hip Thrust', sets: '3×12', weights: '—', note: '' },
    { name: 'Standing OHP', sets: '3×12', weights: '—', note: '' },
  ];
  return [];
}

function getLegacySession(dow, ctx) {
  // Weeks 1–3 original structure
  const sessions = {

// ── HEATMAP ───────────────────────────────────────────────────
function buildHeatmap(yearW, expanded) {
  const dayMap = {};
  for (const w of yearW) {
    if (!dayMap[w.date]) dayMap[w.date] = [];
    dayMap[w.date].push(w.sport_type?.toLowerCase() || '');
  }

  function cellColor(types) {
    if (!types || types.length === 0) return '#1e1c18';
    if (types.some(t=>t.includes('run')&&!t.includes('weight'))) {
      const hasSwim = types.some(t=>t.includes('swim'));
      const hasLift = types.some(t=>t.includes('weight')||t.includes('strength'));
      if (hasSwim && hasLift) return '#e8c060';
      if (hasSwim || hasLift) return '#d4845a';
      return '#d4845a';
    }
    if (types.some(t=>t.includes('swim'))) return '#6ab3a8';
    if (types.some(t=>t.includes('weight')||t.includes('strength'))) return '#a8c47a';
    if (types.some(t=>t.includes('ride')||t.includes('cycling'))) return '#8a82c8';
    if (types.some(t=>t.includes('walk'))) return '#4a4540';
    return '#3a3530';
  }

  const start = new Date('2026-01-01');
  const today = new Date();
  const cells = [];
  const d = new Date(start);
  const startDow = start.getDay();
  for (let i = 0; i < startDow; i++) cells.push(null);
  while (d <= today) { cells.push(d.toISOString().slice(0, 10)); d.setDate(d.getDate() + 1); }

  const cellSize = expanded ? 12 : 9;
  const gap = expanded ? 2 : 1.5;
  const weeks = Math.ceil(cells.length / 7);
  const width = weeks * (cellSize + gap);
  const height = 7 * (cellSize + gap);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  const monthLabels = [];
  let lastMonth = -1;
  for (let i = 0; i < cells.length; i++) {
    if (!cells[i]) continue;
    const mo = new Date(cells[i]).getMonth();
    if (mo !== lastMonth) {
      const col = Math.floor(i / 7);
      monthLabels.push({ month: months[mo], x: col * (cellSize + gap) });
      lastMonth = mo;
    }
  }

  let svg = `<svg viewBox="0 0 ${width} ${height + (expanded?16:0)}" width="100%" style="overflow:visible">`;
  if (expanded) {
    for (const { month, x } of monthLabels) {
      svg += `<text x="${x}" y="10" fill="#4a4540" font-size="8" font-family="'DM Mono',monospace">${month}</text>`;
    }
    svg += `<g transform="translate(0,14)">`;
  }

  for (let i = 0; i < cells.length; i++) {
    const date = cells[i];
    const col = Math.floor(i / 7);
    const row = i % 7;
    const x = col * (cellSize + gap);
    const y = row * (cellSize + gap);
    if (!date) { svg += `<rect x="${x}" y="${y}" width="${cellSize}" height="${cellSize}" rx="2" fill="#1e1c18"/>`; continue; }
    const types = dayMap[date];
    const color = cellColor(types);
    const opacity = (!types || types.length === 0) ? 0.3 : 1;
    const isToday = date === today.toISOString().slice(0,10);
    svg += `<rect x="${x}" y="${y}" width="${cellSize}" height="${cellSize}" rx="2" fill="${color}" opacity="${opacity}"${isToday?' stroke="#f0ebe3" stroke-width="1"':''}><title>${date}${types?.length?' · '+types.join(', '):''}</title></rect>`;
  }

  if (expanded) svg += `</g>`;
  svg += `</svg>`;
  return svg;
}

<!-- MOVEMENT CARD -->
<div class="card tappable" onclick="openDetail('movement')">
  <div class="card-label">Movement <span style="display:flex;align-items:center;gap:6px"><span class="card-source">Apple Health</span><span class="card-chevron">›</span></span></div>
  <div class="move-grid">
    <div><div class="move-label">Steps</div><div class="move-val" style="color:var(--steps)">${a0?.steps?.toLocaleString()??'—'}</div></div>
    <div><div class="move-label">Active cal</div><div class="move-val" style="color:var(--run)">${a0?.active_calories?.toLocaleString()??'—'}</div></div>
  </div>
  <div class="bar-row">
    ${activity.slice(0,7).reverse().map(d=>{
      const ms=Math.max(...activity.slice(0,7).map(x=>x.steps||0),1);
      const mc=Math.max(...activity.slice(0,7).map(x=>x.active_calories||0),1);
      const sh=Math.round(((d.steps||0)/ms)*44); const ch=Math.round(((d.active_calories||0)/mc)*44);
      const dl=['Su','Mo','Tu','We','Th','Fr','Sa'][new Date(d.date+'T12:00:00').getDay()];
      return`<div class="bar-day"><div style="height:${Math.max(sh,ch)}px;display:flex;align-items:flex-end;gap:1px;width:100%"><div class="bar-seg" style="flex:1;height:${sh}px;background:var(--steps);opacity:.7"></div><div class="bar-seg" style="flex:1;height:${ch}px;background:var(--run);opacity:.7"></div></div><div class="bar-lbl">${dl}</div></div>`;
    }).join('')}
  </div>
  ${a0?.flights_climbed?`<div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:10px">${a0.flights_climbed} flights climbed</div>`:''}
</div>

<!-- HR & HRV CARD -->
<div class="card tappable" onclick="openDetail('heart')">
  <div class="card-label">Heart rate & HRV <span style="display:flex;align-items:center;gap:6px"><span class="card-source">Apple Health</span><span class="card-chevron">›</span></span></div>
  <div class="hr-grid">
    <div><div class="hr-label">Resting HR</div><div class="hr-val" style="color:var(--hr)">${h0?.resting_hr??'—'}<span class="hr-unit"> bpm</span></div></div>
    <div><div class="hr-label">HRV</div><div class="hr-val" style="color:var(--sleep)">${h0?.hrv_ms?Math.round(h0.hrv_ms):(avgHRV??'—')}<span class="hr-unit"> ms</span></div></div>
  </div>
  <svg class="sparkline" viewBox="0 0 200 32" preserveAspectRatio="none">
    ${(()=>{const v=hr.slice(0,14).reverse().map(h=>h.resting_hr||0).filter(x=>x>0);if(v.length<2)return'';const mn=Math.min(...v)-5,mx=Math.max(...v)+5;const pts=v.map((x,i)=>`${((i/(v.length-1))*200).toFixed(1)},${(32-((x-mn)/(mx-mn))*30).toFixed(1)}`).join(' ');return`<polyline points="${pts}" fill="none" stroke="var(--hr)" stroke-width="1.5" stroke-linejoin="round" opacity=".7"/>`;})()}
  </svg>
  <div style="font-family:var(--mono);font-size:10px;color:var(--muted2)">14-day resting HR trend</div>
</div>

<!-- TRAINING CARD -->
<div class="card tappable" onclick="openDetail('training')">
  <div class="card-label">Training <span style="display:flex;align-items:center;gap:6px"><span class="card-source">Strava</span><span class="card-chevron">›</span></span></div>
  <div class="train-week">
    <div class="train-mini"><div class="train-mini-label">Run</div><div class="train-mini-val" style="color:var(--run)">${toMi(weekRun)}</div><div class="train-mini-sub">mi this week</div></div>
    <div class="train-mini"><div class="train-mini-label">Swim</div><div class="train-mini-val" style="color:var(--swim)">${weekSwim>0?(weekSwim/1000).toFixed(1)+'k':'—'}</div><div class="train-mini-sub">meters</div></div>
    <div class="train-mini"><div class="train-mini-label">Lifts</div><div class="train-mini-val" style="color:var(--lift)">${weekLift}</div><div class="train-mini-sub">sessions</div></div>
  </div>
  ${recentW.slice(0,4).map(w=>`
  <div class="workout-row">
    <span class="ws ${sportClass(w.sport_type)}">${sportLabel(w.sport_type)}</span>
    <span class="workout-name">${w.name||''}${w.pr_count>0?'<span class="pr-dot"></span>':''}</span>
    <span class="workout-stat">${w.sport_type?.toLowerCase().includes('run')?toMi(w.distance_m)+' · '+toPace(w.duration_s,w.distance_m)+'/mi':w.sport_type?.toLowerCase().includes('swim')?(w.distance_m?Math.round(w.distance_m)+'m':''):toTime(w.duration_s)}</span>
  </div>`).join('')}
</div>

<!-- BODY CARD -->
${b0?`
<div class="card tappable" onclick="openDetail('body')">
  <div class="card-label">Body <span style="display:flex;align-items:center;gap:6px"><span class="card-source">Apple Health</span><span class="card-chevron">›</span></span></div>
  ${b0.weight_lbs?`<div class="body-row"><span class="body-key">Weight</span><span class="body-val">${b0.weight_lbs.toFixed(1)} <span style="color:var(--muted);font-size:11px">lbs</span></span></div>`:''}
  ${b0.body_fat_pct?`<div class="body-row"><span class="body-key">Body fat</span><span class="body-val">${b0.body_fat_pct.toFixed(1)}<span style="color:var(--muted);font-size:11px">%</span></span></div>`:''}
  ${b0.vo2_max?`<div class="body-row"><span class="body-key">VO2 Max</span><span class="body-val">${b0.vo2_max.toFixed(1)} <span style="color:var(--muted);font-size:11px">ml/kg/min</span></span></div>`:''}
</div>`:''}

<!-- RECOVERY CARD -->
${garmin.length?`
<div class="card tappable" onclick="openDetail('recovery')">
  <div class="card-label">Recovery <span style="display:flex;align-items:center;gap:6px"><span class="card-source">Garmin</span><span class="card-chevron">›</span></span></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
    <div>
      <div style="font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px">Body battery</div>
      <div style="font-family:var(--serif);font-size:38px;line-height:1;color:var(--lift)">${g0?.body_battery_max??'—'}</div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px">peak · low ${g0?.body_battery_min??'—'}</div>
    </div>
    <div>
      <div style="font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px">Stress avg</div>
      <div style="font-family:var(--serif);font-size:38px;line-height:1;color:${(g0?.stress_avg||50)<25?'var(--lift)':(g0?.stress_avg||50)<50?'var(--steps)':'var(--hr)'}">${g0?.stress_avg??'—'}</div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px">${(g0?.stress_avg||50)<25?'low · restful':(g0?.stress_avg||50)<50?'moderate':'elevated'}</div>
    </div>
  </div>
</div>`:''}

<!-- YEAR IN TRAINING -->
<div class="card tappable" onclick="openDetail('heatmap')">
  <div class="card-label">2026 in training <span style="display:flex;align-items:center;gap:6px"><span class="card-source">Strava</span><span class="card-chevron">›</span></span></div>
  ${(()=>{
    const totalRuns = yearW.filter(w=>w.sport_type?.toLowerCase().includes('run')).length;
    const totalSwims = yearW.filter(w=>w.sport_type?.toLowerCase().includes('swim')).length;
    const totalLifts = yearW.filter(w=>w.sport_type?.toLowerCase().includes('weight')||w.sport_type?.toLowerCase().includes('strength')).length;
    const totalDays = new Set(yearW.map(w=>w.date)).size;
    const dayOfYear = Math.floor((new Date() - new Date('2026-01-01')) / 86400000) + 1;
    const pct = Math.round((totalDays / dayOfYear) * 100);
    return `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div style="background:var(--card2);border-radius:10px;padding:12px">
        <div style="font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px">Active days</div>
        <div style="font-family:var(--serif);font-size:28px;color:var(--steps)">${totalDays}</div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--muted2);margin-top:2px">${pct}% of year</div>
      </div>
      <div style="background:var(--card2);border-radius:10px;padding:12px">
        <div style="font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px">Runs</div>
        <div style="font-family:var(--serif);font-size:28px;color:var(--run)">${totalRuns}</div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--muted2);margin-top:2px">sessions</div>
      </div>
      <div style="background:var(--card2);border-radius:10px;padding:12px">
        <div style="font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px">Swims</div>
        <div style="font-family:var(--serif);font-size:28px;color:var(--swim)">${totalSwims}</div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--muted2);margin-top:2px">sessions</div>
      </div>
      <div style="background:var(--card2);border-radius:10px;padding:12px">
        <div style="font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px">Lifts</div>
        <div style="font-family:var(--serif);font-size:28px;color:var(--lift)">${totalLifts}</div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--muted2);margin-top:2px">sessions</div>
      </div>
    </div>
    ${buildHeatmap(yearW, false)}`;
  })()}
</div>`;

    document.getElementById('last-sync').textContent = `synced ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
    btn.textContent = '↻ Refresh'; btn.classList.remove('syncing');

  } catch(err) {
    console.error('loadAll error:', err);
    document.getElementById('cards').innerHTML = `
      <div style="padding:2rem;text-align:center;">
        <div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:12px">Could not load health data</div>
        ${buildTodayWorkoutCard()}
      </div>`;
    document.getElementById('last-sync').textContent = 'sync failed';
    btn.textContent = '↻ Retry'; btn.classList.remove('syncing');
  }
}

// ── DETAIL PANELS ─────────────────────────────────────────────
function openDetail(type) {
  detailCharts.forEach(c => c.destroy());
  detailCharts = [];
  const overlay = document.getElementById('overlay');
  const title = document.getElementById('detail-title');
  const body = document.getElementById('detail-body');

  if (type === 'workout') {
    const s = getTodaySession();
    title.textContent = s.label || 'Today';
    body.innerHTML = buildWorkoutDetail();
    overlay.classList.add('open');
    return;
  }

  const { sleep, hr, activity, body: bodyData, recentW, garmin, sleep90, hr90, activity90, yearW } = DATA;
  if (!sleep) return;

  const s0=sleep[0], h0=hr[0], a0=activity[0], b0=bodyData[0], g0=garmin?.[0];

  if (type === 'sleep') {
    title.textContent = 'Sleep';
    const avgSleep = sleep.length ? (sleep.reduce((a,b)=>a+(b.duration_h||0),0)/sleep.length).toFixed(1) : '—';
    body.innerHTML = `
      <div class="detail-section">
        <div class="big-stat"><div class="big-stat-val" style="color:var(--sleep)">${s0?.duration_h?.toFixed(1)??'—'}h</div><div class="big-stat-sub">Last night · avg ${avgSleep}h</div></div>
        <div class="grid2">
          <div class="mini-stat"><div class="mini-stat-label">Deep</div><div class="mini-stat-val" style="color:#5a4fa8">${s0?.deep_h?.toFixed(1)??'—'}h</div></div>
          <div class="mini-stat"><div class="mini-stat-label">REM</div><div class="mini-stat-val" style="color:#8b7ec8">${s0?.rem_h?.toFixed(1)??'—'}h</div></div>
          <div class="mini-stat"><div class="mini-stat-label">Core</div><div class="mini-stat-val" style="color:#c8b8f0">${s0?.core_h?.toFixed(1)??'—'}h</div></div>
          <div class="mini-stat"><div class="mini-stat-label">Awake</div><div class="mini-stat-val" style="color:var(--muted)">${s0?.awake_h?.toFixed(1)??'—'}h</div></div>
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-section-title">14-day history</div>
        ${sleep.slice(0,14).map(s=>{const h=s.duration_h||0;const pct=Math.round((h/10)*100);return`<div class="history-row"><span class="history-date">${shortDate(s.date)}</span><div class="history-bar-wrap"><div class="history-bar" style="width:${pct}%;background:${h>=8?'#8b7ec8':h>=7?'#6a5fa8':'#4a3f88'}"></div></div><span class="history-val">${h.toFixed(1)}h</span></div>`;}).join('')}
      </div>`;
  }

  if (type === 'movement') {
    title.textContent = 'Movement';
    body.innerHTML = `
      <div class="detail-section">
        <div class="grid2">
          <div class="mini-stat"><div class="mini-stat-label">Steps</div><div class="mini-stat-val" style="color:var(--steps)">${a0?.steps?.toLocaleString()??'—'}</div></div>
          <div class="mini-stat"><div class="mini-stat-label">Active cal</div><div class="mini-stat-val" style="color:var(--run)">${a0?.active_calories?.toLocaleString()??'—'}</div></div>
          <div class="mini-stat"><div class="mini-stat-label">Flights</div><div class="mini-stat-val">${a0?.flights_climbed??'—'}</div></div>
          <div class="mini-stat"><div class="mini-stat-label">Stand hrs</div><div class="mini-stat-val">${a0?.stand_hours??'—'}</div></div>
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-section-title">14-day steps</div>
        ${activity.slice(0,14).map(d=>{const s=d.steps||0;const pct=Math.round((s/12000)*100);return`<div class="history-row"><span class="history-date">${shortDate(d.date)}</span><div class="history-bar-wrap"><div class="history-bar" style="width:${Math.min(pct,100)}%;background:var(--steps)"></div></div><span class="history-val">${(s/1000).toFixed(1)}k</span></div>`;}).join('')}
      </div>`;
  }

  if (type === 'heart') {
    title.textContent = 'Heart';
    const avgHRV = hr.filter(h=>h.hrv_ms).length ? Math.round(hr.filter(h=>h.hrv_ms).reduce((a,b)=>a+b.hrv_ms,0)/hr.filter(h=>h.hrv_ms).length) : '—';
    body.innerHTML = `
      <div class="detail-section">
        <div class="grid2">
          <div class="mini-stat"><div class="mini-stat-label">Resting HR</div><div class="mini-stat-val" style="color:var(--hr)">${h0?.resting_hr??'—'}</div><div class="mini-stat-sub">bpm</div></div>
          <div class="mini-stat"><div class="mini-stat-label">HRV</div><div class="mini-stat-val" style="color:var(--sleep)">${h0?.hrv_ms?Math.round(h0.hrv_ms):avgHRV}</div><div class="mini-stat-sub">ms · 30d avg ${avgHRV}</div></div>
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-section-title">Resting HR history</div>
        ${hr.slice(0,14).map(h=>{const v=h.resting_hr||0;const pct=Math.round(((v-40)/60)*100);return`<div class="history-row"><span class="history-date">${shortDate(h.date)}</span><div class="history-bar-wrap"><div class="history-bar" style="width:${Math.min(pct,100)}%;background:var(--hr)"></div></div><span class="history-val">${v||'—'}</span></div>`;}).join('')}
      </div>`;
  }

  if (type === 'training') {
    title.textContent = 'Training';
    body.innerHTML = `
      <div class="detail-section">
        <div class="detail-section-title">Recent workouts</div>
        ${recentW.map(w=>`
          <div class="workout-item">
            <div class="workout-item-header">
              <span class="workout-badge" style="background:${sportColor(w.sport_type)}22;color:${sportColor(w.sport_type)}">${sportLabel(w.sport_type)}</span>
              <span class="workout-item-name">${w.name||''}${w.pr_count>0?'<span class="pr-dot"></span>':''}</span>
            </div>
            <div class="workout-item-stats">
              ${w.sport_type?.toLowerCase().includes('run')?`<span>${toMi(w.distance_m)} mi · ${toPace(w.duration_s,w.distance_m)}/mi · ${toTime(w.duration_s)}</span>`:''}
              ${w.sport_type?.toLowerCase().includes('swim')?`<span>${w.distance_m?Math.round(w.distance_m)+'m':''} · ${toTime(w.duration_s)}</span>`:''}
              ${!w.sport_type?.toLowerCase().includes('run')&&!w.sport_type?.toLowerCase().includes('swim')?`<span>${toTime(w.duration_s)}</span>`:''}
              ${w.relative_effort?`<span>RE: ${w.relative_effort}</span>`:''}
            </div>
          </div>`).join('')}
      </div>`;
  }

  if (type === 'body') {
    title.textContent = 'Body';
    body.innerHTML = `
      <div class="detail-section">
        <div class="stat-row"><span class="stat-key">Weight</span><span class="stat-val">${b0?.weight_lbs?.toFixed(1)??'—'} lbs</span></div>
        <div class="stat-row"><span class="stat-key">Body fat</span><span class="stat-val">${b0?.body_fat_pct?.toFixed(1)??'—'}%</span></div>
        <div class="stat-row"><span class="stat-key">Lean mass</span><span class="stat-val">${b0?.weight_lbs&&b0?.body_fat_pct?(b0.weight_lbs*(1-b0.body_fat_pct/100)).toFixed(1)+'lbs':'—'}</span></div>
        <div class="stat-row"><span class="stat-key">VO2 Max</span><span class="stat-val">${b0?.vo2_max?.toFixed(1)??'—'}</span></div>
      </div>`;
  }

  if (type === 'recovery') {
    title.textContent = 'Recovery';
    body.innerHTML = `
      <div class="detail-section">
        <div class="grid2">
          <div class="mini-stat"><div class="mini-stat-label">Body battery peak</div><div class="mini-stat-val" style="color:var(--lift)">${g0?.body_battery_max??'—'}</div></div>
          <div class="mini-stat"><div class="mini-stat-label">Body battery low</div><div class="mini-stat-val" style="color:var(--muted)">${g0?.body_battery_min??'—'}</div></div>
          <div class="mini-stat"><div class="mini-stat-label">Stress avg</div><div class="mini-stat-val">${g0?.stress_avg??'—'}</div></div>
          <div class="mini-stat"><div class="mini-stat-label">Respiration</div><div class="mini-stat-val">${g0?.respiration_avg??'—'}</div><div class="mini-stat-sub">br/min</div></div>
        </div>
      </div>`;
  }

  if (type === 'heatmap') {
    title.textContent = '2026 in Training';
    const totalRuns = yearW.filter(w=>w.sport_type?.toLowerCase().includes('run')).length;
    const totalSwims = yearW.filter(w=>w.sport_type?.toLowerCase().includes('swim')).length;
    const totalLifts = yearW.filter(w=>w.sport_type?.toLowerCase().includes('weight')||w.sport_type?.toLowerCase().includes('strength')).length;
    body.innerHTML = `
      <div class="detail-section">
        <div class="grid2" style="margin-bottom:16px">
          <div class="mini-stat"><div class="mini-stat-label">Runs</div><div class="mini-stat-val" style="color:var(--run)">${totalRuns}</div></div>
          <div class="mini-stat"><div class="mini-stat-label">Swims</div><div class="mini-stat-val" style="color:var(--swim)">${totalSwims}</div></div>
          <div class="mini-stat"><div class="mini-stat-label">Lifts</div><div class="mini-stat-val" style="color:var(--lift)">${totalLifts}</div></div>
          <div class="mini-stat"><div class="mini-stat-label">Active days</div><div class="mini-stat-val" style="color:var(--steps)">${new Set(yearW.map(w=>w.date)).size}</div></div>
        </div>
        ${buildHeatmap(yearW, true)}
        <div style="display:flex;gap:12px;margin-top:12px;flex-wrap:wrap">
          <div class="stage-item"><div class="stage-dot" style="background:#d4845a"></div> Run</div>
          <div class="stage-item"><div class="stage-dot" style="background:#6ab3a8"></div> Swim</div>
          <div class="stage-item"><div class="stage-dot" style="background:#a8c47a"></div> Lift</div>
          <div class="stage-item"><div class="stage-dot" style="background:#8a82c8"></div> Ride</div>
          <div class="stage-item"><div class="stage-dot" style="background:#e8c060"></div> Triple day</div>
        </div>
      </div>`;
  }

  overlay.classList.add('open');
}

function closeDetail(e) {
  if (e.target === document.getElementById('overlay') || e.target.classList.contains('overlay-backdrop')) {
    closeDetailBtn();
  }
}
function closeDetailBtn() {
  document.getElementById('overlay').classList.remove('open');
  detailCharts.forEach(c => c.destroy());
  detailCharts = [];
}

// ── BOOT ─────────────────────────────────────────────────────
// FIX: Set date immediately and auto-load on page open
document.getElementById('header-date').textContent = fmtDate(new Date());
loadAll();
</script>
