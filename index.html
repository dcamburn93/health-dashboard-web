<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Danny</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F2EFE9;
  --bg2: #E8E4DC;
  --ink: #1A1A2E;
  --ink2: #4A4860;
  --ink3: #9896A8;
  --coral: #E8533A;
  --coral-dim: rgba(232,83,58,0.12);
  --teal: #2A9D8F;
  --teal-dim: rgba(42,157,143,0.12);
  --amber: #E9C46A;
  --amber-dim: rgba(233,196,106,0.15);
  --purple: #6B5B95;
  --purple-dim: rgba(107,91,149,0.12);
  --rule: rgba(26,26,46,0.1);
  --cond: 'Barlow Condensed', sans-serif;
  --body: 'Barlow', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--bg); color: var(--ink); font-family: var(--body); min-height: 100vh; overscroll-behavior: none; }

/* ── HEADER ── */
.header {
  padding: 52px 20px 16px;
  border-bottom: 2px solid var(--ink);
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}
.header-left {}
.header-day {
  font-family: var(--cond);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 2px;
}
.header-name {
  font-family: var(--cond);
  font-size: 52px;
  font-weight: 800;
  line-height: 0.9;
  letter-spacing: -1px;
  color: var(--ink);
}
.header-name span { color: var(--coral); }
.header-right { text-align: right; }
.sync-btn {
  font-family: var(--cond);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  background: none;
  border: 1.5px solid var(--ink);
  color: var(--ink);
  padding: 6px 14px;
  border-radius: 2px;
  cursor: pointer;
}
.sync-btn.syncing { border-color: var(--coral); color: var(--coral); }
.sync-time {
  font-family: var(--cond);
  font-size: 10px;
  color: var(--ink3);
  margin-top: 5px;
  letter-spacing: 0.08em;
}

/* ── SECTIONS ── */
.sections { padding-bottom: 60px; }

.section {
  border-bottom: 1px solid var(--rule);
  cursor: pointer;
  transition: background 0.15s;
}
.section:active { background: var(--bg2); }

.section-inner {
  padding: 18px 20px;
}

.section-label {
  font-family: var(--cond);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.section-label-right {
  font-size: 9px;
  color: var(--ink3);
  font-weight: 400;
  letter-spacing: 0.1em;
}

/* ── METRIC ROW ── */
.metric-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-bottom: 4px;
}
.metric-big {
  font-family: var(--cond);
  font-size: 56px;
  font-weight: 800;
  line-height: 1;
  letter-spacing: -1px;
}
.metric-unit {
  font-family: var(--cond);
  font-size: 18px;
  font-weight: 400;
  color: var(--ink3);
  letter-spacing: 0.05em;
}
.metric-sub {
  font-family: var(--cond);
  font-size: 12px;
  font-weight: 400;
  color: var(--ink3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* ── GRID STATS ── */
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--rule);
  border: 1px solid var(--rule);
  border-radius: 4px;
  overflow: hidden;
  margin-top: 10px;
}
.stat-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.stat-cell {
  background: var(--bg);
  padding: 10px 12px;
}
.stat-cell-label {
  font-family: var(--cond);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 3px;
}
.stat-cell-val {
  font-family: var(--cond);
  font-size: 26px;
  font-weight: 700;
  line-height: 1;
  color: var(--ink);
}
.stat-cell-sub {
  font-family: var(--cond);
  font-size: 10px;
  color: var(--ink3);
  margin-top: 1px;
}

/* ── SLEEP STAGE BAR ── */
.stage-strip {
  display: flex;
  height: 5px;
  border-radius: 3px;
  overflow: hidden;
  gap: 2px;
  margin: 10px 0 6px;
}
.stage-seg { border-radius: 2px; }
.stage-labels {
  display: flex;
  gap: 14px;
}
.stage-label-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-family: var(--cond);
  font-size: 10px;
  color: var(--ink3);
  letter-spacing: 0.08em;
}
.stage-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── SPARKLINE ── */
.spark-wrap { margin-top: 10px; }
.spark-label {
  font-family: var(--cond);
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 4px;
}

/* ── BAR CHART ── */
.bar-chart {
  display: flex;
  align-items: flex-end;
  gap: 3px;
  height: 44px;
  margin-top: 10px;
}
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.bar-fill { width: 100%; border-radius: 2px 2px 0 0; min-height: 2px; }
.bar-lbl { font-family: var(--cond); font-size: 8px; color: var(--ink3); letter-spacing: 0.06em; }

/* ── WORKOUT CARD ── */
.workout-hero {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 10px;
}
.workout-icon {
  width: 44px; height: 44px;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.workout-title {
  font-family: var(--cond);
  font-size: 28px;
  font-weight: 800;
  line-height: 1;
  letter-spacing: -0.5px;
}
.workout-note {
  font-family: var(--cond);
  font-size: 12px;
  color: var(--ink3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 2px;
}
.workout-session {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 9px 0;
  border-top: 1px solid var(--rule);
}
.session-icon {
  width: 26px; height: 26px;
  border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
  margin-top: 1px;
}
.session-name {
  font-family: var(--cond);
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: 0.02em;
}
.session-detail {
  font-family: var(--cond);
  font-size: 11px;
  color: var(--ink3);
  margin-top: 1px;
  letter-spacing: 0.05em;
}
.bike-note {
  margin-top: 8px;
  padding: 8px 10px;
  background: var(--purple-dim);
  border-left: 2px solid var(--purple);
  border-radius: 2px;
}
.bike-note-label {
  font-family: var(--cond);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--purple);
  margin-bottom: 2px;
}
.bike-note-text {
  font-family: var(--cond);
  font-size: 12px;
  color: var(--ink2);
}

/* ── RECENT WORKOUTS ── */
.workout-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 0;
  border-top: 1px solid var(--rule);
}
.workout-row:first-child { border-top: none; }
.ws-badge {
  font-family: var(--cond);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 3px 7px;
  border-radius: 2px;
  min-width: 38px;
  text-align: center;
}
.ws-run { background: rgba(232,83,58,0.12); color: var(--coral); }
.ws-swim { background: rgba(42,157,143,0.12); color: var(--teal); }
.ws-lift { background: rgba(107,91,149,0.12); color: var(--purple); }
.ws-ride { background: rgba(233,196,106,0.2); color: #9A7B1A; }
.ws-walk { background: rgba(26,26,46,0.08); color: var(--ink2); }
.workout-row-name {
  flex: 1;
  font-family: var(--cond);
  font-size: 14px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.workout-row-stat {
  font-family: var(--cond);
  font-size: 12px;
  color: var(--ink3);
  white-space: nowrap;
  letter-spacing: 0.05em;
}

/* ── HEATMAP ── */
.heatmap-wrap { margin-top: 10px; overflow: hidden; }

/* ── DETAIL OVERLAY ── */
.overlay { position: fixed; inset: 0; z-index: 100; pointer-events: none; }
.overlay.open { pointer-events: all; }
.overlay-backdrop { position: absolute; inset: 0; background: rgba(26,26,46,0); transition: background 0.3s; }
.overlay.open .overlay-backdrop { background: rgba(26,26,46,0.5); }
.detail-sheet {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: var(--bg);
  border-radius: 16px 16px 0 0;
  border-top: 2px solid var(--ink);
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
  max-height: 88vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.overlay.open .detail-sheet { transform: translateY(0); }
.detail-handle { width: 32px; height: 3px; background: var(--ink3); border-radius: 2px; margin: 12px auto 0; }
.detail-head {
  padding: 12px 20px 14px;
  border-bottom: 1px solid var(--rule);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky; top: 0;
  background: var(--bg);
  z-index: 1;
}
.detail-head-title {
  font-family: var(--cond);
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.3px;
}
.detail-close {
  font-family: var(--cond);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: none;
  border: 1.5px solid var(--rule);
  color: var(--ink3);
  padding: 5px 10px;
  border-radius: 2px;
  cursor: pointer;
}
.detail-body { padding: 20px; }
.detail-section { margin-bottom: 24px; }
.detail-section-title {
  font-family: var(--cond);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink3);
  border-bottom: 1px solid var(--rule);
  padding-bottom: 6px;
  margin-bottom: 12px;
}
.detail-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--rule);
  font-family: var(--cond);
}
.detail-row:last-child { border-bottom: none; }
.detail-row-key { font-size: 13px; color: var(--ink2); letter-spacing: 0.05em; }
.detail-row-val { font-size: 14px; font-weight: 600; letter-spacing: 0.02em; }

.loading-state {
  padding: 60px 20px;
  text-align: center;
  font-family: var(--cond);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink3);
}
.loading-state .dot {
  display: inline-block;
  animation: blink 1.4s infinite;
}
.loading-state .dot:nth-child(2) { animation-delay: 0.2s; }
.loading-state .dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

.phase-badge {
  display: inline-block;
  font-family: var(--cond);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  background: var(--coral-dim);
  color: var(--coral);
  padding: 2px 8px;
  border-radius: 2px;
  margin-bottom: 10px;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-day" id="header-day"></div>
    <div class="header-name">DAN<span>.</span></div>
  </div>
  <div class="header-right">
    <button class="sync-btn" id="sync-btn" onclick="loadAll()">↻ Sync</button>
    <div class="sync-time" id="sync-time">—</div>
  </div>
</div>

<div class="sections" id="sections">
  <div class="loading-state">
    Loading<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
  </div>
</div>

<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="overlay-backdrop"></div>
  <div class="detail-sheet" id="detail-sheet">
    <div class="detail-handle"></div>
    <div class="detail-head">
      <div class="detail-head-title" id="detail-title"></div>
      <button class="detail-close" onclick="closeDetail()">Close</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

<script>
const SB = 'https://csylhxbnpqsfwicqrsex.supabase.co'
const KEY = 'sb_publishable_sWgNLaMZQba18okU49M--A_eIYijz2v'
let D = {}

async function q(table, params = '') {
  const r = await fetch(`${SB}/rest/v1/${table}?${params}`, {
    headers: { apikey: KEY, Authorization: `Bearer ${KEY}` }
  })
  if (!r.ok) throw new Error(`${table} failed`)
  return r.json()
}

// ── FORMATTERS ────────────────────────────────────────────────
const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday']
const months = ['January','February','March','April','May','June','July','August','September','October','November','December']
const shortDays = ['Su','Mo','Tu','We','Th','Fr','Sa']

const fmtDay = () => {
  const d = new Date()
  return `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}`
}
const toMi = m => m ? (m / 1609.34).toFixed(1) : '—'
const toPace = (s, m) => {
  if (!s || !m || m < 100) return '—'
  const mpm = (s / 60) / (m / 1609.34)
  return `${Math.floor(mpm)}:${String(Math.round((mpm % 1) * 60)).padStart(2, '0')}/mi`
}
const toTime = s => {
  if (!s) return '—'
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60)
  return h > 0 ? `${h}h ${m}m` : `${m}m`
}
const shortDate = d => {
  const dt = new Date(d + 'T12:00:00')
  return shortDays[dt.getDay()] + ' ' + dt.getDate()
}
const sportLabel = t => {
  if (!t) return 'LIFT'
  t = t.toLowerCase()
  if (t.includes('run')) return 'RUN'
  if (t.includes('swim')) return 'SWIM'
  if (t.includes('ride') || t.includes('cycl')) return 'RIDE'
  if (t.includes('walk')) return 'WALK'
  return 'LIFT'
}
const sportClass = t => {
  if (!t) return 'ws-lift'
  t = t.toLowerCase()
  if (t.includes('run')) return 'ws-run'
  if (t.includes('swim')) return 'ws-swim'
  if (t.includes('ride') || t.includes('cycl')) return 'ws-ride'
  if (t.includes('walk')) return 'ws-walk'
  return 'ws-lift'
}

// ── PROGRAM ENGINE ────────────────────────────────────────────
const PROGRAM_START = new Date('2026-05-24T00:00:00')

function getCtx() {
  const today = new Date(); today.setHours(0,0,0,0)
  const days = Math.floor((today - PROGRAM_START) / 86400000)
  const weekNum = Math.min(12, Math.max(1, Math.floor(days / 7) + 1))
  const phase = weekNum <= 4 ? 1 : weekNum <= 8 ? 2 : 3
  const phaseName = ['','Foundation','Build','Peak'][phase]
  const isDeload = [4,8,12].includes(weekNum)
  return { weekNum, phase, phaseName, isDeload }
}

function getTodaySession() {
  const ctx = getCtx()
  const dow = new Date().getDay()
  const { weekNum, phase, phaseName, isDeload } = ctx
  const tag = `Phase ${phase} · Wk ${weekNum}${isDeload ? ' · Deload' : ''}`

  if (dow === 0) return { type: 'rest', label: 'Rest Day', tag, note: 'Full rest or easy walk', ctx }

  if (ctx.weekNum < 4) {
    // Legacy structure weeks 1-3
    const legacy = {
      1: { type:'lift', label:'Upper A', icon:'🏋️', color:'var(--purple)', bg:'var(--purple-dim)', note:`RPE 6–7 · ~45 min`, tag, ctx },
      2: { type:'swim+run', label:'Swim + Run', icon:'🏊', color:'var(--teal)', bg:'var(--teal-dim)', note:'All aerobic · RPE 6', tag, ctx,
        sessions:[{type:'run',label:'Zone 2 easy run',detail:'30–35 min · HR 125–140 bpm'},{type:'swim',label:'Easy aerobic swim',detail:'1,500–1,800m · easy pace'}]},
      3: { type:'lift', label:'Lower A', icon:'🏋️', color:'var(--purple)', bg:'var(--purple-dim)', note:`RPE 6–7 · ~45 min`, tag, ctx },
      4: { type:'swim+run', label:'Swim + Run', icon:'🏊', color:'var(--teal)', bg:'var(--teal-dim)', note:'All aerobic · RPE 6', tag, ctx,
        sessions:[{type:'swim',label:'Easy aerobic swim',detail:'1,500–1,800m'},{type:'run',label:'Zone 2 easy run',detail:'30–35 min after swim'}]},
      5: { type:'lift', label:'Full Body', icon:'🏋️', color:'var(--purple)', bg:'var(--purple-dim)', note:`RPE 6 · ~40 min`, tag, ctx },
      6: { type:'open', label:'Open Session', icon:'🎯', color:'var(--teal)', bg:'var(--teal-dim)', note:'Feel-based', tag, ctx, detail:'Run, swim, or both — easy effort' },
    }
    return legacy[dow] || { type:'rest', label:'Rest Day', tag, ctx }
  }

  // Week 4+ new structure
  const liftLabels = { 1:'Upper A', 3:'Lower A', 5:'Upper B' }
  const bikeDetails = {
    deload: 'Easy 20–25 min spin · Zone 1–2',
    1: 'Zone 2 · 25–30 min',
    2: phase === 2 && weekNum <= 6 ? 'Zone 2 + 2×8 min tempo' : '3×10 min threshold',
    3: '4–5×8 min sweet spot · 35–45 min'
  }
  const bikeDetail = isDeload ? bikeDetails.deload : bikeDetails[phase] || bikeDetails[1]

  if ([1,3,5].includes(dow)) {
    return { type:'lift+bike', label:`${liftLabels[dow]}`, liftLabel:liftLabels[dow], bikeDetail,
      icon:'🏋️', color:'var(--purple)', bg:'var(--purple-dim)',
      note: isDeload ? 'Deload — 60% load' : `RPE ${phase===3?'8–9':phase===2?'7–8':'6–7'} · ~45 min`, tag, ctx }
  }
  if ([2,4].includes(dow)) {
    const isThu = dow === 4
    const swimDetail = isDeload ? 'Easy 1,400m · drills' :
      phase === 1 ? '1,800–2,200m · Zone 2' :
      phase === 2 ? (isThu ? 'Threshold · 2,200–2,600m · 3×400 at CSS' : 'Endurance · 2,400–2,800m') :
      (isThu ? 'Race-pace · 2,800–3,200m' : 'Speed · 3,000–3,400m')
    const runDetail = isDeload ? 'Easy jog · 25 min' :
      phase === 1 ? '30–35 min · Zone 2' :
      phase === 2 ? (isThu ? 'Tempo · 35–42 min' : 'Easy · 38–42 min') :
      (isThu ? 'Intervals · 40–45 min' : 'Easy · 42–48 min')
    return { type:'swim+run', label:'Swim + Run', icon:'🏊', color:'var(--teal)', bg:'var(--teal-dim)',
      note: isDeload ? 'Easy effort only' : `Phase ${phase} ${isThu?'· intensity':'· base'}`,
      tag, ctx, sessions:[
        {type:'swim', label:isThu?'Threshold swim':'Endurance swim', detail:swimDetail},
        {type:'run', label:isThu?'Tempo run':'Easy run', detail:runDetail}
      ]}
  }
  if (dow === 6) {
    return { type:'open', label:'Open Session', icon:'🎯', color:'var(--teal)', bg:'var(--teal-dim)',
      note: isDeload ? 'Zone 1–2 only · 30 min max' : 'Run, swim, or both',
      detail: isDeload ? 'Keep it genuinely easy.' :
        phase === 3 ? 'Good slot for a longer easy run (60+ min) or easy brick.' :
        'Match to fatigue — swim if legs are cooked, run if feeling fresh.',
      tag, ctx }
  }
  return { type:'rest', label:'Rest Day', tag, ctx }
}

// ── BUILD WORKOUT CARD HTML ───────────────────────────────────
function buildWorkoutCard() {
  const s = getTodaySession()
  const { tag, ctx } = s

  if (s.type === 'rest') {
    return `<div class="section" onclick="openDetail('workout')">
      <div class="section-inner">
        <div class="section-label">Today's Workout <span class="section-label-right">${tag} ›</span></div>
        <div class="workout-hero">
          <div class="workout-icon" style="background:rgba(26,26,46,0.06)">😴</div>
          <div>
            <div class="workout-title">Rest Day</div>
            <div class="workout-note">${s.note}</div>
          </div>
        </div>
      </div>
    </div>`
  }

  if (s.type === 'open') {
    return `<div class="section" onclick="openDetail('workout')">
      <div class="section-inner">
        <div class="section-label">Today's Workout <span class="section-label-right">${tag} ›</span></div>
        <div class="workout-hero">
          <div class="workout-icon" style="background:${s.bg}">${s.icon}</div>
          <div>
            <div class="workout-title" style="color:${s.color}">${s.label}</div>
            <div class="workout-note">${s.note}</div>
          </div>
        </div>

// ── HEATMAP ───────────────────────────────────────────────────
function buildHeatmap(yearW, size = 8, gap = 1.5) {
  const dayMap = {}
  for (const w of yearW) {
    if (!dayMap[w.date]) dayMap[w.date] = []
    dayMap[w.date].push((w.sport_type||'').toLowerCase())
  }
  const cellColor = types => {
    if (!types?.length) return '#E0DDD6'
    if (types.some(t=>t.includes('run'))) return '#E8533A'
    if (types.some(t=>t.includes('swim'))) return '#2A9D8F'
    if (types.some(t=>t.includes('weight')||t.includes('strength')||t.includes('lift'))) return '#6B5B95'
    if (types.some(t=>t.includes('ride')||t.includes('cycl'))) return '#E9C46A'
    return '#9896A8'
  }
  const start = new Date('2026-01-01')
  const today = new Date()
  const cells = []
  const d = new Date(start)
  for (let i = 0; i < start.getDay(); i++) cells.push(null)
  while (d <= today) { cells.push(d.toISOString().slice(0,10)); d.setDate(d.getDate()+1) }
  const weeks = Math.ceil(cells.length / 7)
  const w = weeks * (size + gap)
  const h = 7 * (size + gap)
  let svg = `<svg viewBox="0 0 ${w} ${h}" width="100%" style="overflow:visible">`
  for (let i = 0; i < cells.length; i++) {
    const date = cells[i]
    const col = Math.floor(i/7), row = i%7
    const x = col*(size+gap), y = row*(size+gap)
    if (!date) { svg += `<rect x="${x}" y="${y}" width="${size}" height="${size}" rx="1.5" fill="#E0DDD6" opacity=".4"/>`; continue }
    const types = dayMap[date]
    const isToday = date === today.toISOString().slice(0,10)
    svg += `<rect x="${x}" y="${y}" width="${size}" height="${size}" rx="1.5" fill="${cellColor(types)}" opacity="${types?.length?1:0.5}"${isToday?' stroke="#1A1A2E" stroke-width="1.5"':''}><title>${date}${types?.length?' · '+types.join(', '):''}</title></rect>`
  }
  svg += '</svg>'
  return svg
}

        </div>
      </div>
      <div class="detail-section">
        <div class="detail-section-title">14-day steps</div>
        ${activity.slice(0,14).map(d=>{
          const s=d.steps||0; const pct=Math.min(Math.round((s/15000)*100),100)
          return `<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--rule)">
            <span style="font-family:var(--cond);font-size:11px;color:var(--ink3);width:44px">${shortDate(d.date)}</span>
            <div style="flex:1;background:var(--bg2);border-radius:2px;height:5px"><div style="width:${pct}%;height:5px;border-radius:2px;background:var(--amber)"></div></div>
            <span style="font-family:var(--cond);font-size:12px;font-weight:600;width:38px;text-align:right">${s>999?(s/1000).toFixed(1)+'k':s||'—'}</span>
          </div>`}).join('')}
      </div>`
  }

  if (type === 'training') {
    title.textContent = 'Training'
    body2.innerHTML = `
      <div class="detail-section">
        <div class="detail-section-title">Recent workouts</div>
        ${recentW.map(w=>`
          <div style="padding:10px 0;border-bottom:1px solid var(--rule)">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
              <span class="ws-badge ${sportClass(w.sport_type)}">${sportLabel(w.sport_type)}</span>
              <span style="font-family:var(--cond);font-size:15px;font-weight:600">${w.name||sportLabel(w.sport_type)}</span>
            </div>
            <div style="font-family:var(--cond);font-size:11px;color:var(--ink3);display:flex;gap:14px;letter-spacing:.05em">
              ${w.sport_type?.toLowerCase().includes('run')?`<span>${toMi(w.distance_m)} mi</span><span>${toPace(w.duration_s,w.distance_m)}</span><span>${toTime(w.duration_s)}</span>`:''}
              ${w.sport_type?.toLowerCase().includes('swim')?`<span>${w.distance_m?Math.round(w.distance_m)+'m':''}</span><span>${toTime(w.duration_s)}</span>`:''}
              ${!w.sport_type?.toLowerCase().includes('run')&&!w.sport_type?.toLowerCase().includes('swim')?`<span>${toTime(w.duration_s)}</span>`:''}
            </div>
          </div>`).join('')}
      </div>`
  }

  if (type === 'body') {
    title.textContent = 'Body'
    const recent = body.slice(0,7)
    const weightChange = recent.length>1 ? (recent[0].weight_lbs - recent[recent.length-1].weight_lbs).toFixed(1) : null
    body2.innerHTML = `
      <div class="detail-section">
        <div class="detail-row"><div class="detail-row-key">Weight</div><div class="detail-row-val">${b0?.weight_lbs?.toFixed(1)??"—"} lbs</div></div>
        <div class="detail-row"><div class="detail-row-key">Body fat</div><div class="detail-row-val">${b0?.body_fat_pct?.toFixed(1)??"—"}%</div></div>
        <div class="detail-row"><div class="detail-row-key">Lean mass</div><div class="detail-row-val">${b0?.weight_lbs&&b0?.body_fat_pct?(b0.weight_lbs*(1-b0.body_fat_pct/100)).toFixed(1)+' lbs':'—'}</div></div>
        <div class="detail-row"><div class="detail-row-key">VO2 Max</div><div class="detail-row-val">${b0?.vo2_max?.toFixed(1)??"—"}</div></div>
        ${weightChange!==null?`<div class="detail-row"><div class="detail-row-key">7-day trend</div><div class="detail-row-val" style="color:${weightChange>0?'var(--coral)':'var(--teal)'}">${weightChange>0?'+':''}${weightChange} lbs</div></div>`:''}
      </div>
      <div class="detail-section">
        <div class="detail-section-title">Goals</div>
        <div class="detail-row"><div class="detail-row-key">Target weight</div><div class="detail-row-val">177–178 lbs</div></div>
        <div class="detail-row"><div class="detail-row-key">Target body fat</div><div class="detail-row-val">12%</div></div>
        <div class="detail-row"><div class="detail-row-key">Daily protein</div><div class="detail-row-val">180–190g</div></div>
      </div>`
  }

  if (type === 'recovery') {
    title.textContent = 'Recovery'
    body2.innerHTML = `
      <div class="detail-section">
        <div class="stat-grid">
          <div class="stat-cell"><div class="stat-cell-label">Body battery peak</div><div class="stat-cell-val" style="color:var(--teal);font-size:36px">${g0?.body_battery_max??"—"}</div></div>
          <div class="stat-cell"><div class="stat-cell-label">Body battery low</div><div class="stat-cell-val" style="font-size:36px">${g0?.body_battery_min??"—"}</div></div>
          <div class="stat-cell"><div class="stat-cell-label">Stress avg</div><div class="stat-cell-val" style="font-size:36px">${g0?.stress_avg??"—"}</div></div>
          <div class="stat-cell"><div class="stat-cell-label">SpO2</div><div class="stat-cell-val" style="font-size:36px">${g0?.spo2_avg?g0.spo2_avg.toFixed(1)+'%':'—'}</div></div>
        </div>
      </div>`
  }

  if (type === 'year') {
    title.textContent = '2026'
    const totalDays = new Set(yearW.map(w=>w.date)).size
    const dayOfYear = Math.floor((new Date()-new Date('2026-01-01'))/86400000)+1
    body2.innerHTML = `
      <div class="detail-section">
        <div class="stat-grid" style="margin-bottom:12px">
          <div class="stat-cell"><div class="stat-cell-label">Active days</div><div class="stat-cell-val" style="color:var(--ink)">${totalDays}</div><div class="stat-cell-sub">${Math.round(totalDays/dayOfYear*100)}% of year</div></div>
          <div class="stat-cell"><div class="stat-cell-label">Runs</div><div class="stat-cell-val" style="color:var(--coral)">${yearW.filter(w=>w.sport_type?.toLowerCase().includes('run')).length}</div></div>
          <div class="stat-cell"><div class="stat-cell-label">Swims</div><div class="stat-cell-val" style="color:var(--teal)">${yearW.filter(w=>w.sport_type?.toLowerCase().includes('swim')).length}</div></div>
          <div class="stat-cell"><div class="stat-cell-label">Lifts</div><div class="stat-cell-val" style="color:var(--purple)">${yearW.filter(w=>['weight','strength'].some(x=>w.sport_type?.toLowerCase().includes(x))).length}</div></div>
        </div>
        <div class="heatmap-wrap">${buildHeatmap(yearW, 11, 2)}</div>
      </div>`
  }

  document.getElementById('overlay').classList.add('open')
}

function buildWorkoutDetail(s) {
  if (s.type === 'rest') return `<div class="detail-section"><p style="font-family:var(--cond);font-size:14px;color:var(--ink2);line-height:1.6">Full rest or easy 20–30 min walk. Focus on sleep, hydration, and hitting 180–190g protein.</p></div>`

  if (s.type === 'open') return `<div class="detail-section">
    <div class="detail-section-title">Saturday open session</div>
    <p style="font-family:var(--cond);font-size:14px;color:var(--ink2);line-height:1.6;margin-bottom:14px">${s.detail}</p>
    <div class="detail-row"><div class="detail-row-key">Legs feel good</div><div class="detail-row-val" style="color:var(--coral)">Long easy run 50–70 min</div></div>
    <div class="detail-row"><div class="detail-row-key">Legs are cooked</div><div class="detail-row-val" style="color:var(--teal)">Easy swim 1,200–1,500m</div></div>
    <div class="detail-row"><div class="detail-row-key">Feeling great</div><div class="detail-row-val" style="color:var(--purple)">Easy brick (bike + run)</div></div>
    <div class="detail-row"><div class="detail-row-key">Deload week</div><div class="detail-row-val" style="color:var(--ink3)">30 min max · Zone 1–2</div></div>
  </div>`

  let html = ''

  if (s.type === 'lift+bike') {
    html += `<div class="detail-section">
      <div class="detail-section-title">${s.liftLabel} — lifting</div>
      <div class="detail-row"><div class="detail-row-key">Intensity</div><div class="detail-row-val">${s.note}</div></div>
      <div class="detail-row"><div class="detail-row-key">Duration</div><div class="detail-row-val">~45 min</div></div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">🚴 Post-lift bike</div>
      <p style="font-family:var(--cond);font-size:14px;color:var(--ink2);line-height:1.6;margin-bottom:12px">${s.bikeDetail}</p>
      <div class="detail-row"><div class="detail-row-key">Order</div><div class="detail-row-val">Lift first, bike after</div></div>
      <div class="detail-row"><div class="detail-row-key">If legs destroyed</div><div class="detail-row-val">Pure Zone 1 spin only</div></div>
      <div class="detail-row"><div class="detail-row-key">Indoor vs outdoor</div><div class="detail-row-val">Either works</div></div>
    </div>`
  }

  if (s.type === 'swim+run' || s.type === 'run+swim') {
    ;(s.sessions||[]).forEach(sess => {
      html += `<div class="detail-section">
        <div class="detail-section-title">${sess.type === 'swim' ? '🏊' : '🏃'} ${sess.label}</div>
        <p style="font-family:var(--cond);font-size:14px;color:var(--ink2);line-height:1.6">${sess.detail}</p>
      </div>`
    })
    html += `<div class="detail-section">
      <div class="detail-section-title">Notes</div>
      <div class="detail-row"><div class="detail-row-key">Order</div><div class="detail-row-val">Swim first, run after</div></div>
      <div class="detail-row"><div class="detail-row-key">Protein target</div><div class="detail-row-val">180–190g today</div></div>
    </div>`
  }

  return html || `<div class="detail-section"><div class="detail-row"><div class="detail-row-key">Note</div><div class="detail-row-val">${s.note}</div></div></div>`
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay') || e.target.classList.contains('overlay-backdrop')) closeDetail()
}
function closeDetail() {
  document.getElementById('overlay').classList.remove('open')
}

// ── BOOT ─────────────────────────────────────────────────────
document.getElementById('header-day').textContent = fmtDay()
loadAll()
</script>
</body>
</html>
