<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Danny — Today</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #141210;
    --card: #1c1916;
    --card2: #221f1b;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.1);
    --text: #f0ebe3;
    --muted: #7a7168;
    --muted2: #4a4540;
    --run: #d4845a;
    --swim: #6ab3a8;
    --lift: #a8c47a;
    --sleep: #8b7ec8;
    --hr: #c87e8b;
    --steps: #c4a85a;
    --serif: 'DM Serif Display', serif;
    --sans: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.5; min-height: 100vh; }

  /* ── HEADER ── */
  .header { padding: 2rem 1.5rem 1rem; display: flex; justify-content: space-between; align-items: flex-start; }
  .header-date { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 4px; }
  .header-title { font-family: var(--serif); font-size: 42px; line-height: 1; letter-spacing: -1px; }
  .header-right { text-align: right; }
  .sync-btn { background: none; border: 1px solid var(--border2); border-radius: 20px; color: var(--muted); font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; padding: 5px 12px; cursor: pointer; transition: all 0.2s; }
  .sync-btn:hover { color: var(--text); border-color: var(--border2); }
  .sync-btn.syncing { color: var(--swim); border-color: var(--swim); }
  .last-sync { font-family: var(--mono); font-size: 9px; color: var(--muted2); margin-top: 6px; }

  /* ── CARDS ── */
  .cards { padding: 0 1rem 2rem; display: flex; flex-direction: column; gap: 10px; max-width: 480px; margin: 0 auto; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem; overflow: hidden; }
  .card-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; }
  .card-source { font-size: 9px; color: var(--muted2); }

  /* ── SLEEP CARD ── */
  .sleep-main { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; }
  .sleep-hours { font-family: var(--serif); font-size: 56px; line-height: 1; color: var(--text); }
  .sleep-unit { font-size: 20px; color: var(--muted); }
  .sleep-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--sleep); margin-left: 4px; display: inline-block; }
  .sleep-sub { font-size: 13px; color: var(--text); margin-bottom: 2px; }
  .sleep-avg { font-size: 12px; color: var(--muted); }
  .sleep-stages { display: flex; gap: 3px; margin-top: 1rem; height: 4px; border-radius: 2px; overflow: hidden; }
  .stage { height: 100%; border-radius: 2px; }
  .sleep-dots { display: flex; gap: 6px; margin-top: 12px; }
  .sleep-day-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* ── MOVEMENT CARD ── */
  .movement-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .movement-stat { }
  .movement-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
  .movement-val { font-family: var(--serif); font-size: 38px; line-height: 1; }
  .movement-chart { margin-top: 1rem; }
  .bar-row { display: flex; gap: 4px; align-items: flex-end; height: 48px; }
  .bar-day { flex: 1; display: flex; flex-direction: column; gap: 2px; align-items: center; }
  .bar-seg { width: 100%; border-radius: 2px 2px 0 0; min-height: 2px; transition: height 0.3s; }
  .bar-label { font-family: var(--mono); font-size: 8px; color: var(--muted2); margin-top: 3px; }
  .movement-pie { width: 64px; height: 64px; }

  /* ── TRAINING CARD ── */
  .training-today { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--card2); border-radius: 10px; margin-bottom: 8px; }
  .training-sport-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .training-name { font-size: 13px; font-weight: 500; flex: 1; }
  .training-meta { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .training-week { display: flex; gap: 6px; margin-top: 4px; }
  .week-day { flex: 1; }
  .week-day-label { font-family: var(--mono); font-size: 8px; color: var(--muted2); text-align: center; margin-bottom: 4px; }
  .week-day-bars { display: flex; flex-direction: column; gap: 2px; }
  .week-sport-bar { height: 4px; border-radius: 2px; width: 100%; }

  /* ── HR / HRV CARD ── */
  .hr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .hr-stat-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .hr-stat-val { font-family: var(--serif); font-size: 38px; line-height: 1; }
  .hr-stat-unit { font-size: 13px; color: var(--muted); }
  .hr-trend { margin-top: 0.75rem; }
  .sparkline { width: 100%; height: 32px; }

  /* ── BODY CARD ── */
  .body-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .body-row:last-child { border-bottom: none; }
  .body-key { font-size: 13px; color: var(--muted); }
  .body-val { font-family: var(--mono); font-size: 14px; font-weight: 500; }
  .body-trend { font-size: 11px; margin-left: 6px; }

  /* ── LOADING / EMPTY ── */
  .loading { text-align: center; padding: 3rem; color: var(--muted); font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; }
  .pulse { animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
  .skeleton { background: var(--card2); border-radius: 4px; animation: pulse 1.5s ease-in-out infinite; }

  /* ── RECENT WORKOUTS ── */
  .workout-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .workout-row:last-child { border-bottom: none; }
  .workout-sport { font-size: 9px; font-weight: 600; letter-spacing: 0.08em; padding: 2px 7px; border-radius: 4px; min-width: 40px; text-align: center; font-family: var(--mono); }
  .ws-run  { background: rgba(212,132,90,0.15); color: var(--run); }
  .ws-swim { background: rgba(106,179,168,0.15); color: var(--swim); }
  .ws-ride { background: rgba(138,130,200,0.15); color: #8a82c8; }
  .ws-lift { background: rgba(168,196,122,0.15); color: var(--lift); }
  .ws-walk { background: rgba(196,168,90,0.15); color: var(--steps); }
  .workout-name { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .workout-stat { font-family: var(--mono); font-size: 11px; color: var(--muted); white-space: nowrap; }
  .pr-pip { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--run); margin-left: 4px; vertical-align: middle; }

  /* ── WEEKLY SUMMARY BAR ── */
  .weekly-bar { display: flex; gap: 4px; margin-top: 12px; }
  .wk-seg { height: 6px; border-radius: 3px; }

  @media (min-width: 500px) {
    .cards { padding: 0 1.5rem 2rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-date" id="header-date">Wednesday, June 10</div>
    <div class="header-title">Today</div>
  </div>
  <div class="header-right">
    <button class="sync-btn" id="sync-btn" onclick="loadAll()">↻ Refresh</button>
    <div class="last-sync" id="last-sync">loading...</div>
  </div>
</div>

<div class="cards" id="cards">
  <div class="loading pulse">LOADING YOUR DATA</div>
</div>

<script>
const SUPABASE_URL = 'https://csylhxbnpqsfwicqrsex.supabase.co';
const ANON_KEY = 'sb_publishable_sWgNLaMZQba18okU49M--A_eIYijz2v';

async function query(table, params = '') {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
    headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}` }
  });
  if (!res.ok) throw new Error(`${table} query failed`);
  return res.json();
}

function fmt(d) {
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}`;
}

function toMi(m) { return m ? (m / 1609.34).toFixed(1) : '—'; }
function toPace(s, m) {
  if (!s || !m || m < 100) return '—';
  const mpm = (s / 60) / (m / 1609.34);
  return `${Math.floor(mpm)}:${String(Math.round((mpm % 1) * 60)).padStart(2,'0')}`;
}
function toTime(s) {
  if (!s) return '—';
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}
function sportColor(t) {
  if (!t) return '#888';
  t = t.toLowerCase();
  if (t.includes('run')) return '#d4845a';
  if (t.includes('swim')) return '#6ab3a8';
  if (t.includes('ride') || t.includes('cycling')) return '#8a82c8';
  if (t.includes('weight') || t.includes('strength')) return '#a8c47a';
  if (t.includes('walk')) return '#c4a85a';
  return '#888';
}
function sportClass(t) {
  if (!t) return 'ws-lift';
  t = t.toLowerCase();
  if (t.includes('run')) return 'ws-run';
  if (t.includes('swim')) return 'ws-swim';
  if (t.includes('ride')) return 'ws-ride';
  if (t.includes('walk')) return 'ws-walk';
  return 'ws-lift';
}

async function loadAll() {
  const btn = document.getElementById('sync-btn');
  btn.textContent = '↻ Syncing...';
  btn.classList.add('syncing');

  const today = new Date();
  document.getElementById('header-date').textContent = fmt(today);

  const todayStr = today.toISOString().slice(0,10);
  const d7 = new Date(today); d7.setDate(d7.getDate() - 7);
  const d7Str = d7.toISOString().slice(0,10);
  const d30 = new Date(today); d30.setDate(d30.getDate() - 30);
  const d30Str = d30.toISOString().slice(0,10);

  try {
    const [sleepData, hrData, activityData, bodyData, recentWorkouts, weekWorkouts] = await Promise.all([
      query('sleep', `select=*&order=date.desc&limit=14`),
      query('heart_rate', `select=*&order=date.desc&limit=30`),
      query('daily_activity', `select=*&order=date.desc&limit=14`),
      query('body_metrics', `select=*&order=date.desc&limit=7`),
      query('workouts', `select=*&order=date.desc&limit=6`),
      query('workouts', `select=*&date=gte.${d7Str}&order=date.desc`),
    ]);

    const todaySleep  = sleepData[0];
    const todayHR     = hrData[0];
    const todayAct    = activityData[0];
    const todayBody   = bodyData[0];
    const avgSleep    = sleepData.length ? (sleepData.reduce((a,b) => a + (b.duration_h||0), 0) / sleepData.length).toFixed(1) : '—';
    const avgHRV      = hrData.length ? Math.round(hrData.reduce((a,b) => a + (b.hrv_ms||0), 0) / hrData.filter(h=>h.hrv_ms).length) : '—';

    // Weekly sport totals
    const weekRun  = weekWorkouts.filter(w=>w.sport_type?.toLowerCase().includes('run')).reduce((a,b)=>a+(b.distance_m||0),0);
    const weekSwim = weekWorkouts.filter(w=>w.sport_type?.toLowerCase().includes('swim')).reduce((a,b)=>a+(b.distance_m||0),0);
    const weekLift = weekWorkouts.filter(w=>w.sport_type?.toLowerCase().includes('weight')||w.sport_type?.toLowerCase().includes('strength')).length;

    const cards = document.getElementById('cards');
    cards.innerHTML = `

    <!-- SLEEP -->
    <div class="card">
      <div class="card-label">Sleep <span class="card-source">Apple Health</span></div>
      <div class="sleep-main">
        <span class="sleep-hours">${todaySleep?.duration_h?.toFixed(1) ?? '—'}</span>
        <span class="sleep-unit">h</span>
        ${todaySleep ? '<span class="sleep-dot"></span>' : ''}
      </div>
      ${todaySleep?.bedtime ? `<div class="sleep-sub">In bed ${todaySleep.bedtime}</div>` : ''}
      <div class="sleep-avg">7-day avg · ${avgSleep}h</div>
      ${todaySleep?.deep_h || todaySleep?.rem_h ? `
      <div class="sleep-stages">
        <div class="stage" style="flex:${todaySleep.deep_h||0};background:#5a4fa8"></div>
        <div class="stage" style="flex:${todaySleep.rem_h||0};background:#8b7ec8"></div>
        <div class="stage" style="flex:${todaySleep.core_h||0};background:#c8b8f0"></div>
        <div class="stage" style="flex:${todaySleep.awake_h||0};background:#3a3540"></div>
      </div>
      <div style="display:flex;gap:12px;margin-top:6px;font-family:var(--mono);font-size:10px;color:var(--muted)">
        <span style="color:#5a4fa8">■</span> Deep ${todaySleep.deep_h?.toFixed(1)||0}h
        <span style="color:#8b7ec8">■</span> REM ${todaySleep.rem_h?.toFixed(1)||0}h
        <span style="color:#c8b8f0">■</span> Core ${todaySleep.core_h?.toFixed(1)||0}h
      </div>` : ''}
      <div class="sleep-dots">
        ${sleepData.slice(0,7).reverse().map(s => {
          const h = s.duration_h || 0;
          const color = h >= 8 ? '#8b7ec8' : h >= 7 ? '#6a5fa8' : h >= 6 ? '#4a3f88' : '#2a2040';
          return `<div class="sleep-day-dot" style="background:${color}" title="${s.date}: ${h}h"></div>`;
        }).join('')}
      </div>
    </div>

    <!-- MOVEMENT -->
    <div class="card">
      <div class="card-label">Movement <span class="card-source">Apple Health</span></div>
      <div class="movement-grid">
        <div class="movement-stat">
          <div class="movement-label">Steps</div>
          <div class="movement-val" style="color:var(--steps)">${todayAct?.steps?.toLocaleString() ?? '—'}</div>
        </div>
        <div class="movement-stat">
          <div class="movement-label">Active cal</div>
          <div class="movement-val" style="color:var(--run)">${todayAct?.active_calories?.toLocaleString() ?? '—'}</div>
        </div>
      </div>
      <div class="movement-chart">
        <div class="bar-row">
          ${activityData.slice(0,7).reverse().map((d,i) => {
            const maxSteps = Math.max(...activityData.slice(0,7).map(x=>x.steps||0), 1);
            const maxCal = Math.max(...activityData.slice(0,7).map(x=>x.active_calories||0), 1);
            const sH = Math.round(((d.steps||0)/maxSteps)*40);
            const cH = Math.round(((d.active_calories||0)/maxCal)*40);
            const dayLabel = ['Su','Mo','Tu','We','Th','Fr','Sa'][new Date(d.date+'T12:00:00').getDay()];
            return `<div class="bar-day">
              <div style="height:${Math.max(sH,cH)}px;display:flex;align-items:flex-end;gap:1px;width:100%">
                <div class="bar-seg" style="flex:1;height:${sH}px;background:var(--steps);opacity:0.7"></div>
                <div class="bar-seg" style="flex:1;height:${cH}px;background:var(--run);opacity:0.7"></div>
              </div>
              <div class="bar-label">${dayLabel}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
      ${todayAct?.flights_climbed ? `<div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:10px">${todayAct.flights_climbed} flights climbed</div>` : ''}
      ${todayAct?.exercise_minutes ? `<div style="font-family:var(--mono);font-size:11px;color:var(--muted)">${todayAct.exercise_minutes} min exercise</div>` : ''}
    </div>

    <!-- HEART RATE & HRV -->
    <div class="card">
      <div class="card-label">Heart rate & HRV <span class="card-source">Apple Health</span></div>
      <div class="hr-grid">
        <div>
          <div class="hr-stat-label">Resting HR</div>
          <div class="hr-stat-val" style="color:var(--hr)">${todayHR?.resting_hr ?? '—'}<span class="hr-stat-unit"> bpm</span></div>
        </div>
        <div>
          <div class="hr-stat-label">HRV</div>
          <div class="hr-stat-val" style="color:var(--sleep)">${todayHR?.hrv_ms ? Math.round(todayHR.hrv_ms) : (avgHRV ?? '—')}<span class="hr-stat-unit"> ms</span></div>
        </div>
      </div>
      <div class="hr-trend">
        <svg class="sparkline" viewBox="0 0 200 32" preserveAspectRatio="none">
          ${(() => {
            const vals = hrData.slice(0,14).reverse().map(h=>h.resting_hr||0).filter(v=>v>0);
            if (vals.length < 2) return '';
            const min = Math.min(...vals) - 5;
            const max = Math.max(...vals) + 5;
            const pts = vals.map((v,i) => {
              const x = (i / (vals.length-1)) * 200;
              const y = 32 - ((v-min)/(max-min)) * 30;
              return `${x.toFixed(1)},${y.toFixed(1)}`;
            }).join(' ');
            return `<polyline points="${pts}" fill="none" stroke="var(--hr)" stroke-width="1.5" stroke-linejoin="round" opacity="0.7"/>`;
          })()}
        </svg>
        <div style="font-family:var(--mono);font-size:10px;color:var(--muted2)">14-day resting HR trend</div>
      </div>
    </div>

    <!-- TRAINING THIS WEEK -->
    <div class="card">
      <div class="card-label">Training <span class="card-source">Strava</span></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1rem">
        <div style="background:var(--card2);border-radius:8px;padding:10px;text-align:center">
          <div style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.08em">Run</div>
          <div style="font-family:var(--serif);font-size:22px;color:var(--run)">${toMi(weekRun)}</div>
          <div style="font-family:var(--mono);font-size:9px;color:var(--muted)">mi this week</div>
        </div>
        <div style="background:var(--card2);border-radius:8px;padding:10px;text-align:center">
          <div style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.08em">Swim</div>
          <div style="font-family:var(--serif);font-size:22px;color:var(--swim)">${weekSwim > 0 ? (weekSwim/1000).toFixed(1)+'k' : '—'}</div>
          <div style="font-family:var(--mono);font-size:9px;color:var(--muted)">meters this week</div>
        </div>
        <div style="background:var(--card2);border-radius:8px;padding:10px;text-align:center">
          <div style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.08em">Lifts</div>
          <div style="font-family:var(--serif);font-size:22px;color:var(--lift)">${weekLift}</div>
          <div style="font-family:var(--mono);font-size:9px;color:var(--muted)">sessions</div>
        </div>
      </div>
      ${recentWorkouts.slice(0,5).map(w => `
      <div class="workout-row">
        <span class="workout-sport ${sportClass(w.sport_type)}">${w.sport_type?.replace('WeightTraining','LIFT').replace('Run','RUN').replace('Swim','SWIM').replace('Ride','RIDE').replace('Walk','WALK') ?? '?'}</span>
        <span class="workout-name">${w.name ?? ''}${w.pr_count > 0 ? '<span class="pr-pip"></span>' : ''}</span>
        <span class="workout-stat">${w.sport_type?.toLowerCase().includes('run') ? toMi(w.distance_m)+' mi · '+toPace(w.duration_s,w.distance_m)+'/mi' : w.sport_type?.toLowerCase().includes('swim') ? (w.distance_m?Math.round(w.distance_m)+'m':'') : toTime(w.duration_s)}</span>
      </div>`).join('')}
    </div>

    <!-- BODY METRICS -->
    ${todayBody || bodyData[0] ? `
    <div class="card">
      <div class="card-label">Body <span class="card-source">Apple Health</span></div>
      ${bodyData[0]?.weight_lbs ? `<div class="body-row"><span class="body-key">Weight</span><span class="body-val">${bodyData[0].weight_lbs.toFixed(1)} <span style="color:var(--muted);font-size:11px">lbs</span></span></div>` : ''}
      ${bodyData[0]?.body_fat_pct ? `<div class="body-row"><span class="body-key">Body fat</span><span class="body-val">${bodyData[0].body_fat_pct.toFixed(1)}<span style="color:var(--muted);font-size:11px">%</span></span></div>` : ''}
      ${bodyData[0]?.vo2_max ? `<div class="body-row"><span class="body-key">VO2 Max</span><span class="body-val">${bodyData[0].vo2_max.toFixed(1)} <span style="color:var(--muted);font-size:11px">ml/kg/min</span></span></div>` : ''}
      <div style="margin-top:12px">
        <div style="font-family:var(--mono);font-size:9px;color:var(--muted2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em">Weight — 30 days</div>
        <svg viewBox="0 0 260 40" width="100%" height="40" preserveAspectRatio="none">
          ${(() => {
            const vals = bodyData.filter(b=>b.weight_lbs).reverse();
            if (vals.length < 2) return '<text x="10" y="20" fill="#4a4540" font-size="10" font-family="monospace">no data yet</text>';
            const min = Math.min(...vals.map(v=>v.weight_lbs)) - 2;
            const max = Math.max(...vals.map(v=>v.weight_lbs)) + 2;
            const pts = vals.map((v,i) => {
              const x = (i/(vals.length-1))*258+1;
              const y = 38 - ((v.weight_lbs-min)/(max-min))*36;
              return `${x.toFixed(1)},${y.toFixed(1)}`;
            }).join(' ');
            return `<polyline points="${pts}" fill="none" stroke="var(--steps)" stroke-width="1.5" stroke-linejoin="round" opacity="0.8"/>`;
          })()}
        </svg>
      </div>
    </div>` : ''}

    `;

    btn.textContent = '↻ Refresh';
    btn.classList.remove('syncing');
    document.getElementById('last-sync').textContent = 'updated ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

  } catch (err) {
    console.error(err);
    document.getElementById('cards').innerHTML = `<div class="loading">Error loading data: ${err.message}</div>`;
    btn.textContent = '↻ Refresh';
    btn.classList.remove('syncing');
  }
}

loadAll();
// Auto-refresh every 5 minutes
setInterval(loadAll, 5 * 60 * 1000);
</script>
</body>
</html>
