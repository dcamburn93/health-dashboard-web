<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Danny</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F2EFE9;
  --bg2: #E8E4DC;
  --card: #FDFCFA;
  --ink: #1A1A2E;
  --ink2: #4A4860;
  --ink3: #9896A8;
  --rule: rgba(26,26,46,0.08);
  --lift: #3B6FE8;
  --lift-bg: rgba(59,111,232,0.08);
  --swim: #0EA5A0;
  --swim-bg: rgba(14,165,160,0.08);
  --run: #D97706;
  --run-bg: rgba(217,119,6,0.08);
  --bike: #7C3AED;
  --bike-bg: rgba(124,58,237,0.08);
  --rest: #9896A8;
  --rest-bg: rgba(152,150,168,0.08);
  --open: #059669;
  --open-bg: rgba(5,150,105,0.08);
  --green: #16A34A;
  --amber: #D97706;
  --red: #DC2626;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--bg); color: var(--ink); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

/* HEADER */
.header {
  padding: 24px 20px 16px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
}
.header-name {
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  color: var(--ink);
  letter-spacing: -0.5px;
}
.header-date {
  font-size: 12px;
  color: var(--ink3);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* CARDS */
.cards {
  padding: 0 16px 32px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.card {
  background: var(--card);
  border-radius: 16px;
  padding: 20px;
  border: 1px solid var(--rule);
}
.card-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 14px;
}
.card-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
}
.card-value {
  font-family: 'DM Serif Display', serif;
  font-size: 40px;
  color: var(--ink);
  letter-spacing: -1px;
  line-height: 1;
}
.card-unit {
  font-size: 14px;
  color: var(--ink3);
  font-weight: 400;
}
.card-sub {
  font-size: 12px;
  color: var(--ink3);
  margin-top: 6px;
}

/* SLEEP BARS */
.sleep-stages {
  display: flex;
  gap: 10px;
  margin-top: 14px;
}
.stage {
  flex: 1;
  text-align: center;
}
.stage-bar-wrap {
  height: 48px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  margin-bottom: 4px;
}
.stage-bar {
  width: 24px;
  border-radius: 4px 4px 0 0;
  min-height: 4px;
}
.stage-val { font-size: 12px; font-weight: 600; color: var(--ink2); }
.stage-lbl { font-size: 10px; color: var(--ink3); margin-top: 2px; letter-spacing: 0.3px; }

/* METRICS GRID */
.metrics-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.metric {
  background: var(--card);
  border-radius: 14px;
  padding: 16px;
  border: 1px solid var(--rule);
}
.metric-value {
  font-family: 'DM Serif Display', serif;
  font-size: 32px;
  color: var(--ink);
  letter-spacing: -0.5px;
  line-height: 1;
}
.metric-unit { font-size: 12px; color: var(--ink3); }
.metric-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--ink3);
  margin-top: 6px;
}
.metric-sub { font-size: 11px; color: var(--ink3); margin-top: 2px; }

/* TREND DOTS */
.trend-row {
  display: flex;
  gap: 4px;
  margin-top: 10px;
  align-items: flex-end;
}
.trend-dot {
  flex: 1;
  border-radius: 2px;
  background: var(--bg2);
  min-height: 4px;
}

/* TODAY CARD */
.today-card {
  background: var(--ink);
  border-radius: 16px;
  padding: 20px;
  color: #fff;
}
.today-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
  margin-bottom: 14px;
}
.today-week {
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  margin-bottom: 8px;
  font-weight: 500;
}
.today-sessions {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.session {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-radius: 10px;
  background: rgba(255,255,255,0.06);
}
.session.done {
  opacity: 0.5;
}
.session-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.session-info { flex: 1; }
.session-type {
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 2px;
}
.session-detail {
  font-size: 11px;
  color: rgba(255,255,255,0.45);
}
.session-check {
  font-size: 16px;
  color: rgba(255,255,255,0.3);
}
.session-check.done { color: #4ADE80; }

/* REST DAY */
.rest-day {
  text-align: center;
  padding: 24px;
  color: rgba(255,255,255,0.35);
  font-size: 14px;
}

/* WORKOUTS DONE */
.workouts-done {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.workouts-done-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  margin-bottom: 8px;
}
.workout-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  font-size: 12px;
}
.workout-item:last-child { border-bottom: none; }
.workout-name { color: rgba(255,255,255,0.7); }
.workout-meta { color: rgba(255,255,255,0.35); }

/* LOADING / ERROR */
.loading { color: var(--ink3); font-size: 13px; }
.dash { color: var(--ink3); }

/* REFRESH */
.refresh-row {
  padding: 0 20px 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.refresh-time { font-size: 11px; color: var(--ink3); }
.refresh-btn {
  font-size: 11px;
  color: var(--ink3);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  background: var(--bg2);
  font-family: inherit;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-name">Danny</div>
  <div class="header-date" id="header-date"></div>
</div>

<div class="refresh-row">
  <div class="refresh-time" id="refresh-time"></div>
  <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
</div>

<div class="cards">

  <!-- SLEEP -->
  <div class="card">
    <div class="card-label">Sleep</div>
    <div class="card-row">
      <div class="card-value" id="sleep-val">—</div>
      <div class="card-unit">hrs</div>
    </div>
    <div class="card-sub" id="sleep-sub">last night</div>
    <div class="sleep-stages" id="sleep-stages" style="display:none">
      <div class="stage">
        <div class="stage-bar-wrap"><div class="stage-bar" id="bar-deep" style="background:#6366F1"></div></div>
        <div class="stage-val" id="val-deep">—</div>
        <div class="stage-lbl">Deep</div>
      </div>
      <div class="stage">
        <div class="stage-bar-wrap"><div class="stage-bar" id="bar-rem" style="background:#8B5CF6"></div></div>
        <div class="stage-val" id="val-rem">—</div>
        <div class="stage-lbl">REM</div>
      </div>
      <div class="stage">
        <div class="stage-bar-wrap"><div class="stage-bar" id="bar-core" style="background:#A78BFA"></div></div>
        <div class="stage-val" id="val-core">—</div>
        <div class="stage-lbl">Core</div>
      </div>
    </div>
  </div>

  <!-- METRICS GRID -->
  <div class="metrics-grid">
    <div class="metric">
      <div class="metric-value" id="steps-val">—</div>
      <div class="metric-label">Steps</div>
      <div class="metric-sub" id="steps-sub"></div>
    </div>
    <div class="metric">
      <div class="metric-value" id="cal-val">—</div>
      <div class="metric-unit">kcal</div>
      <div class="metric-label">Active Cal</div>
      <div class="metric-sub" id="cal-sub"></div>
    </div>
    <div class="metric">
      <div class="metric-value" id="hr-val">—</div>
      <div class="metric-unit">bpm</div>
      <div class="metric-label">Resting HR</div>
      <div class="metric-sub" id="hr-sub"></div>
    </div>
    <div class="metric">
      <div class="metric-value" id="hrv-val">—</div>
      <div class="metric-unit">ms</div>
      <div class="metric-label">HRV</div>
      <div class="metric-sub" id="hrv-sub"></div>
    </div>
  </div>

  <!-- TODAY'S PLAN -->
  <div class="today-card">
    <div class="today-label">Today's Plan</div>
    <div class="today-week" id="today-week"></div>
    <div class="today-sessions" id="today-sessions">
      <div class="loading">Loading plan...</div>
    </div>
    <div class="workouts-done" id="workouts-done" style="display:none">
      <div class="workouts-done-label">Logged Today</div>
      <div id="workouts-list"></div>
    </div>
  </div>

</div>

<script>
const SB = 'https://csylhxbnpqsfwicqrsex.supabase.co';
const KEY = 'sb_publishable_sWgNLaMZQba18okU49M--A_eIYijz2v';

async function q(table, params) {
  const r = await fetch(`${SB}/rest/v1/${table}?${params}`, {
    headers: { apikey: KEY, Accept: 'application/json' }
  });
  return r.json();
}

function fmt(val, dec=1) {
  if (val == null) return '—';
  return Number(val).toFixed(dec);
}

function today() {
  return new Date().toISOString().slice(0, 10);
}

function yesterday() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  return d.toISOString().slice(0, 10);
}

// Workout plan — keyed by date
const PLAN = {
  // Week 1: May 24–30
  '2026-05-25': [{type:'lift',color:'#3B6FE8',label:'Lift',detail:'Full Body A'}],
  '2026-05-26': [{type:'swim',color:'#0EA5A0',label:'Swim',detail:'Zone 2 · 2,000m'}],
  '2026-05-27': [{type:'lift',color:'#3B6FE8',label:'Lift',detail:'Full Body B'}],
  '2026-05-28': [{type:'run',color:'#D97706',label:'Run',detail:'Easy · 35–40 min'}],
  '2026-05-29': [{type:'lift',color:'#3B6FE8',label:'Lift',detail:'Full Body C'}],
  // Week 2: May 31–Jun 6
  '2026-06-01': [{type:'lift',color:'#3B6FE8',label:'Lift',detail:'Full Body A'}],
  '2026-06-02': [{type:'swim',color:'#0EA5A0',label:'Swim',detail:'Zone 2 · 2,200m'}],
  '2026-06-03': [{type:'lift',color:'#3B6FE8',label:'Lift',detail:'Full Body B'}],
  '2026-06-04': [{type:'run',color:'#D97706',label:'Run',detail:'Easy · 38–42 min'}],
  '2026-06-05': [{type:'lift',color:'#3B6FE8',label:'Lift',detail:'Full Body C'}],
  // Week 3: Jun 7–13
  '2026-06-08': [{type:'lift',color:'#3B6FE8',label:'Lift',detail:'Full Body A'}],
  '2026-06-09': [{type:'swim',color:'#0EA5A0',label:'Swim',detail:'Zone 2 · 2,400m'}],
  '2026-06-10': [{type:'lift',color:'#3B6FE8',label:'Lift',detail:'Full Body B'}],
  '2026-06-11': [{type:'run',color:'#D97706',label:'Run',detail:'Easy + strides · 40 min'}],
  '2026-06-12': [{type:'lift',color:'#3B6FE8',label:'Lift',detail:'Full Body C'}],
  // Week 4: Jun 14–20 (Deload)
  '2026-06-15': [{type:'lift',color:'#3B6FE8',label:'Lift',detail:'Full Body (deload)'},{type:'bike',color:'#7C3AED',label:'Bike',detail:'Easy 20–25 min ride'}],
  '2026-06-16': [{type:'swim',color:'#0EA5A0',label:'Swim',detail:'Easy 1,400m'},{type:'run',color:'#D97706',label:'Run',detail:'Easy 25 min jog'}],
  '2026-06-17': [{type:'lift',color:'#3B6FE8',label:'Lift',detail:'Full Body (deload)'},{type:'bike',color:'#7C3AED',label:'Bike',detail:'Easy 20–25 min ride'}],
  '2026-06-18': [{type:'swim',color:'#0EA5A0',label:'Swim',detail:'Drill focus 1,400m'},{type:'run',color:'#D97706',label:'Run',detail:'Easy 25 min jog'}],
  '2026-06-19': [{type:'lift',color:'#3B6FE8',label:'Lift',detail:'Full Body (deload)'},{type:'bike',color:'#7C3AED',label:'Bike',detail:'Easy 20–25 min ride'}],
  '2026-06-20': [{type:'open',color:'#059669',label:'Open',detail:'Run, swim, or both — feel-based'}],
};

function getWeekLabel(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const weeks = [
    {start:'2026-05-24',label:'Week 1 · Foundation'},
    {start:'2026-05-31',label:'Week 2 · Foundation'},
    {start:'2026-06-07',label:'Week 3 · Foundation'},
    {start:'2026-06-14',label:'Week 4 · Deload'},
    {start:'2026-06-21',label:'Week 5 · Build'},
    {start:'2026-06-28',label:'Week 6 · Build'},
  ];
  for (let i = weeks.length - 1; i >= 0; i--) {
    if (dateStr >= weeks[i].start) return weeks[i].label;
  }
  return '';
}

function sportTypeMatch(stravaSport, sessionType) {
  const s = stravaSport.toLowerCase();
  if (sessionType === 'run') return s.includes('run') || s.includes('walk');
  if (sessionType === 'swim') return s.includes('swim');
  if (sessionType === 'bike') return s.includes('ride') || s.includes('bike') || s.includes('cycling');
  if (sessionType === 'lift') return s.includes('weight') || s.includes('strength') || s.includes('crossfit');
  return false;
}

async function loadAll() {
  const td = today();
  const yd = yesterday();

  // Update header
  document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
  document.getElementById('refresh-time').textContent = 'Updated ' + new Date().toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});

  // Sleep — last night
  const sleepData = await q('sleep', `order=date.desc&limit=7`);
  const lastSleep = sleepData.find(r => r.date === yd || r.date === td);
  if (lastSleep && lastSleep.duration_h > 0) {
    const h = Math.floor(lastSleep.duration_h);
    const m = Math.round((lastSleep.duration_h - h) * 60);
    document.getElementById('sleep-val').textContent = `${h}h ${m}m`;
    document.getElementById('sleep-sub').textContent = lastSleep.date === yd ? 'last night' : 'today';
    // Show stages if available
    if (lastSleep.deep_h || lastSleep.rem_h) {
      const maxH = Math.max(lastSleep.deep_h||0, lastSleep.rem_h||0, lastSleep.core_h||0, 0.1);
      const setBar = (id, val) => {
        const el = document.getElementById(id);
        if (el) el.style.height = Math.max(8, (val / maxH) * 48) + 'px';
      };
      setBar('bar-deep', lastSleep.deep_h || 0);
      setBar('bar-rem', lastSleep.rem_h || 0);
      setBar('bar-core', lastSleep.core_h || 0);
      document.getElementById('val-deep').textContent = fmt(lastSleep.deep_h) + 'h';
      document.getElementById('val-rem').textContent = fmt(lastSleep.rem_h) + 'h';
      document.getElementById('val-core').textContent = fmt(lastSleep.core_h) + 'h';
      document.getElementById('sleep-stages').style.display = 'flex';
    }
  } else {
    document.getElementById('sleep-val').textContent = '—';
  }

  // Steps + active cal
  const activity = await q('daily_activity', `date=eq.${td}`);
  const act = activity[0];
  if (act) {
    document.getElementById('steps-val').textContent = act.steps ? Math.round(act.steps).toLocaleString() : '—';
    document.getElementById('cal-val').textContent = act.active_calories ? Math.round(act.active_calories) : '—';
  }

  // HR + HRV
  const hrData = await q('heart_rate', `order=date.desc&limit=14`);
  const todayHR = hrData.find(r => r.date === td) || hrData[0];
  if (todayHR) {
    document.getElementById('hr-val').textContent = todayHR.resting_hr || '—';
    document.getElementById('hrv-val').textContent = todayHR.hrv_ms ? Math.round(todayHR.hrv_ms) : '—';
    // 7-day avg
    const recent = hrData.slice(0, 7);
    const avgHR = recent.filter(r => r.resting_hr).reduce((s, r) => s + r.resting_hr, 0) / recent.filter(r => r.resting_hr).length;
    const avgHRV = recent.filter(r => r.hrv_ms).reduce((s, r) => s + r.hrv_ms, 0) / recent.filter(r => r.hrv_ms).length;
    if (avgHR) document.getElementById('hr-sub').textContent = `7d avg ${Math.round(avgHR)} bpm`;
    if (avgHRV) document.getElementById('hrv-sub').textContent = `7d avg ${Math.round(avgHRV)} ms`;
  }

  // Today's plan
  const sessions = PLAN[td] || null;
  const weekLabel = getWeekLabel(td);
  document.getElementById('today-week').textContent = weekLabel;

  // Today's Strava workouts
  const workouts = await q('workouts', `date=eq.${td}&order=date.desc`);

  if (!sessions) {
    document.getElementById('today-sessions').innerHTML = '<div class="rest-day">Rest day — recover well 🙌</div>';
  } else {
    let html = '';
    for (const s of sessions) {
      const done = workouts.some(w => sportTypeMatch(w.sport_type, s.type));
      html += `
        <div class="session ${done ? 'done' : ''}">
          <div class="session-dot" style="background:${s.color}"></div>
          <div class="session-info">
            <div class="session-type">${s.label}</div>
            <div class="session-detail">${s.detail}</div>
          </div>
          <div class="session-check ${done ? 'done' : ''}">
            ${done ? '✓' : '○'}
          </div>
        </div>`;
    }
    document.getElementById('today-sessions').innerHTML = html;
  }

  // Show logged workouts
  if (workouts.length > 0) {
    document.getElementById('workouts-done').style.display = 'block';
    let whtml = '';
    for (const w of workouts) {
      const dist = w.distance_m > 0 ? (w.distance_m / 1609.34).toFixed(1) + ' mi' : '';
      const dur = w.duration_s > 0 ? Math.round(w.duration_s / 60) + ' min' : '';
      const meta = [dist, dur].filter(Boolean).join(' · ');
      whtml += `<div class="workout-item">
        <div class="workout-name">${w.name || w.sport_type}</div>
        <div class="workout-meta">${meta}</div>
      </div>`;
    }
    document.getElementById('workouts-list').innerHTML = whtml;
  }
}

loadAll();
// Auto-refresh every 5 minutes
setInterval(loadAll, 5 * 60 * 1000);
</script>
</body>
</html>
